<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ALQURMANI X | لوحة التحكم الملكية</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   ROOT VARIABLES & BASE
══════════════════════════════════════ */
:root {
  --g1:#FFD700; --g2:#F5C842; --g3:#D4A017; --g4:#B8860B; --g5:#8B6914;
  --ng:#00FF87; --nr:#FF2D55; --nb:#00C8FF;
  --bg:#04040A; --bg2:#070710; --bg3:#0A0A18;
  --card:rgba(12,12,22,.96); --card2:rgba(15,15,28,.98);
  --brd:rgba(212,160,23,.2); --brdA:rgba(212,160,23,.6);
  --tx:#F0E8D5; --txm:rgba(240,232,213,.45);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background: var(--bg); color: var(--tx); font-family: 'Cairo', sans-serif;
  overflow-x: hidden; line-height: 1.6; opacity: 0; transition: opacity 0.5s ease;
}
body.ready { opacity: 1; }

/* ══════════════════════════════════════
   LOADING OVERLAY
══════════════════════════════════════ */
#loadingOverlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: #000; display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 9999;
}
.loader-crown {
  width: 70px; height: 70px; border: 3px solid transparent;
  border-top-color: var(--g1); border-radius: 50%;
  animation: spin 0.8s linear infinite; position: relative;
}
.loader-crown::after {
  content: "Q"; position: absolute; top:50%; left:50%; transform: translate(-50%,-50%);
  font-family: 'Cinzel'; font-weight: 900; color: var(--g1); font-size: 22px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ══════════════════════════════════════
   DASHBOARD LAYOUT
══════════════════════════════════════ */
.container { max-width: 1100px; margin: 0 auto; padding: 20px; }

.top-bar {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--card); border: 1px solid var(--brd);
  padding: 12px 20px; border-radius: 18px; margin-bottom: 25px;
}
.user-info { display: flex; align-items: center; gap: 12px; }
.avatar { 
  width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--g1);
  background: var(--bg3); display: flex; align-items: center; justify-content: center; font-family: 'Cinzel';
}
.avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

.stats-container {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 15px; margin-bottom: 25px;
}
.stat-box {
  background: var(--card2); border: 1px solid var(--brd);
  padding: 20px; border-radius: 20px; text-align: center;
}
.stat-box .val {
  display: block; font-family: 'Cinzel'; font-size: 26px;
  font-weight: 900; color: var(--g1);
}
.stat-box .lbl { font-size: 11px; color: var(--txm); font-weight: 700; text-transform: uppercase; }

.section-box {
  background: var(--card); border: 1px solid var(--brd);
  border-radius: 20px; padding: 20px;
}
.section-box h3 {
  font-family: 'Cinzel'; font-size: 16px; color: var(--g1);
  margin-bottom: 15px; display: flex; align-items: center; gap: 10px;
}

.act-list { display: flex; flex-direction: column; gap: 10px; }
.act-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px; background: rgba(255,255,255,0.02); border-radius: 12px;
}
.act-meta { display: flex; align-items: center; gap: 12px; }
.act-icon { width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.act-icon.plus { background: rgba(0,255,135,0.1); color: var(--ng); }
.act-icon.minus { background: rgba(255,45,85,0.1); color: var(--nr); }
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="loader-crown"></div>
  <p style="color:var(--g1); font-family:'Cinzel'; margin-top:15px; font-weight:900; letter-spacing:2px">ALQURMANI</p>
</div>

<div class="container">
  <div class="top-bar">
    <div class="user-info">
      <div class="avatar" id="uAvatar"><img src="https://ui-avatars.com/api/?name=User&background=0D0D0D&color=FFD700" alt="Q"></div>
      <div>
        <div id="uName" style="font-weight:900; font-size:15px">جاري التعرف...</div>
        <div id="uStatus" style="font-size:10px; color:var(--g1)">حساب ملكي نشط</div>
      </div>
    </div>
    <button onclick="logout()" style="background:none; border:1px solid var(--nr); color:var(--nr); padding:6px 14px; border-radius:10px; font-weight:700; cursor:pointer">خروج</button>
  </div>

  <div class="stats-container">
    <div class="stat-box">
      <span class="lbl">رصيد المحفظة</span>
      <span class="val" id="bal">0.00</span>
    </div>
    <div class="stat-box">
      <span class="lbl">نقاط المكافأة</span>
      <span class="val" id="pts">0</span>
    </div>
  </div>

  <div class="section-box">
    <h3><span style="font-size:20px">✦</span> السجل المالي الأخير</h3>
    <div class="act-list" id="actList">
      </div>
  </div>
</div>

<script type="module">
// استيراد Firebase المباشر
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, query, where, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// الإعدادات الخاصة بك التي أرسلتها (أبو عبد الله)
const firebaseConfig = {
  apiKey: "AIzaSyCCHBps4vsNXWHnLpxmsJJxUsB-wAYAmBU",
  authDomain: "alqurmani-auth-x.firebaseapp.com",
  projectId: "alqurmani-auth-x",
  storageBucket: "alqurmani-auth-x.firebasestorage.app",
  messagingSenderId: "558487419521",
  appId: "1:558487419521:web:fcf791247b7eefc2a82b80",
  measurementId: "G-B34HTXXMVS"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const $ = (id) => document.getElementById(id);

// ── التحقق من الجلسة والدخول الفوري ──
onAuthStateChanged(auth, async (user) => {
  if (user) {
    // إخفاء التحميل فوراً للسرعة القصوى
    hideLoader();

    // تشغيل جلب البيانات في الخلفية
    loadProfile(user.uid);
    loadBalances(user.uid);
    loadHistory(user.uid);
  } else {
    window.location.href = 'login.html';
  }
});

function hideLoader() {
  document.body.classList.add('ready');
  const loader = $('loadingOverlay');
  loader.style.opacity = '0';
  setTimeout(() => loader.style.display = 'none', 300);
}

// ── دوال جلب البيانات (كاملة وبدون اختصار) ──

async function loadProfile(uid) {
  try {
    const snap = await getDoc(doc(db, "users", uid));
    if (snap.exists()) {
      const d = snap.data();
      $('uName').textContent = d.name || "عضو القرمني";
      if(d.photoURL) $('uAvatar').innerHTML = `<img src="${d.photoURL}">`;
    }
  } catch (e) { console.error(e); }
}

async function loadBalances(uid) {
  // جلب المحفظة والنقاط بالتوازي
  getDoc(doc(db, "wallets", uid)).then(s => {
    if(s.exists()) animateValue($('bal'), 0, s.data().balance || 0, 800);
  });
  getDoc(doc(db, "points", uid)).then(s => {
    if(s.exists()) $('pts').textContent = (s.data().current || 0).toLocaleString();
  });
}

async function loadHistory(uid) {
  try {
    const q = query(collection(db, "transactions"), where("uid", "==", uid), orderBy("createdAt", "desc"), limit(4));
    const snap = await getDocs(q);
    const list = $('actList');
    
    if (snap.empty) {
      list.innerHTML = '<p style="text-align:center; color:var(--txm); font-size:12px; padding:10px;">لا يوجد سجل عمليات</p>';
      return;
    }

    list.innerHTML = snap.docs.map(doc => {
      const tx = doc.data();
      const isPos = tx.amount > 0;
      return `
        <div class="act-item">
          <div class="act-meta">
            <div class="act-icon ${isPos ? 'plus' : 'minus'}">${isPos ? '↙' : '↗'}</div>
            <div>
              <div style="font-size:13px; font-weight:700">${tx.title || 'عملية نظام'}</div>
              <div style="font-size:10px; color:var(--txm)">${new Date().toLocaleDateString('ar-EG')}</div>
            </div>
          </div>
          <div style="font-family:'Cinzel'; font-weight:900; color:${isPos?'var(--ng)':'var(--nr)'}">
            ${isPos ? '+' : ''}${tx.amount}
          </div>
        </div>
      `;
    }).join('');
  } catch (e) { console.error(e); }
}

function animateValue(obj, start, end, duration) {
  let startTimestamp = null;
  const step = (timestamp) => {
    if (!startTimestamp) startTimestamp = timestamp;
    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
    obj.innerHTML = (progress * (end - start) + start).toFixed(2);
    if (progress < 1) window.requestAnimationFrame(step);
  };
  window.requestAnimationFrame(step);
}

window.logout = () => signOut(auth);
</script>
</body>
</html>
