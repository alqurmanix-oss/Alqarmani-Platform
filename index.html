<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ALQURMANI X | لوحة التحكم الملكية</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   إعدادات الألوان والتصميم (الملكي)
══════════════════════════════════════ */
:root {
  --g1:#FFD700; --g2:#F5C842; --g3:#D4A017; --g4:#B8860B;
  --ng:#00FF87; --nr:#FF2D55; --nb:#00C8FF;
  --bg:#04040A; --bg2:#070710;
  --card:rgba(12,12,22,.96);
  --brd:rgba(212,160,23,.2);
  --tx:#F0E8D5; --txm:rgba(240,232,213,.45);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background: var(--bg); color: var(--tx); font-family: 'Cairo', sans-serif;
  overflow-x: hidden; line-height: 1.6; opacity: 0; transition: opacity 0.3s ease;
}
body.ready { opacity: 1; }

/* شاشة التحميل اللحظية */
#loadingOverlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: #000; display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 9999;
  transition: opacity 0.2s ease, visibility 0.2s ease;
}
.loader-crown {
  width: 60px; height: 60px; border: 3px solid transparent;
  border-top-color: var(--g1); border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* الهيكل الرئيسي */
.container { max-width: 1200px; margin: 0 auto; padding: 15px; }

.header-pro {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--card); border: 1px solid var(--brd);
  padding: 15px 20px; border-radius: 15px; margin-bottom: 20px;
}
.user-info { display: flex; align-items: center; gap: 12px; }
.avatar { 
  width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--g1);
  background: #111; overflow: hidden;
}
.avatar img { width: 100%; height: 100%; object-fit: cover; }

.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 15px; margin-bottom: 25px;
}
.stat-card {
  background: var(--card); border: 1px solid var(--brd);
  padding: 20px; border-radius: 18px; text-align: center;
}
.stat-val {
  display: block; font-family: 'Cinzel'; font-size: 24px;
  font-weight: 900; color: var(--g1); margin-top: 5px;
}
.stat-lbl { font-size: 11px; color: var(--txm); font-weight: 700; }

.section-box {
  background: var(--card); border: 1px solid var(--brd);
  border-radius: 18px; padding: 20px;
}
.section-box h3 {
  font-family: 'Cinzel'; font-size: 16px; color: var(--g1);
  margin-bottom: 15px; border-bottom: 1px solid var(--brd); padding-bottom: 8px;
}

.activity-list { display: flex; flex-direction: column; gap: 10px; }
.act-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px; background: rgba(255,255,255,0.02); border-radius: 10px;
}
.act-main { display: flex; align-items: center; gap: 10px; }
.act-ic { width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.act-ic.in { background: rgba(0,255,135,0.1); color: var(--ng); }
.act-ic.out { background: rgba(255,45,85,0.1); color: var(--nr); }
.act-v { font-family: 'Cinzel'; font-weight: 900; }
.act-v.plus { color: var(--ng); }
.act-v.minus { color: var(--nr); }
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="loader-crown"></div>
  <p style="color:var(--g1); font-family:'Cinzel'; margin-top:15px; font-weight:900;">ALQURMANI SYSTEM</p>
</div>

<div class="container">
  <div class="header-pro">
    <div class="user-info">
      <div class="avatar" id="uAv"><img src="https://ui-avatars.com/api/?name=Q&background=000&color=FFD700" id="uImg"></div>
      <div>
        <div id="uName" style="font-weight:900; font-size:15px">جاري المزامنة...</div>
        <div id="uRole" style="font-size:10px; color:var(--g1); font-weight:700">عضوية ملكية نشطة</div>
      </div>
    </div>
    <button onclick="userLogout()" style="background:none; border:1px solid var(--nr); color:var(--nr); padding:6px 12px; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer">خروج</button>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <span class="stat-lbl">رصيد المحفظة (Q)</span>
      <span class="stat-val" id="uBal">0.00</span>
    </div>
    <div class="stat-card">
      <span class="stat-lbl">نقاط المكافأة</span>
      <span class="stat-val" id="uPts">0</span>
    </div>
    <div class="stat-card">
      <span class="stat-lbl">مستوى الثقة</span>
      <span class="stat-val" id="uTrust">0%</span>
    </div>
  </div>

  <div class="section-box">
    <h3>النشاطات المالية اللحظية</h3>
    <div class="activity-list" id="uActs">
      </div>
  </div>
</div>

<script type="module">
// استيراد المكتبات من CDN لضمان السرعة
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, getDocs, collection, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// الإعدادات الخاصة بك يا أبو عبد الله (بدون تعديل)
const firebaseConfig = {
  apiKey: "AIzaSyCCHBps4vsNXWHnLpxmsJJxUsB-wAYAmBU",
  authDomain: "alqurmani-auth-x.firebaseapp.com",
  projectId: "alqurmani-auth-x",
  storageBucket: "alqurmani-auth-x.firebasestorage.app",
  messagingSenderId: "558487419521",
  appId: "1:558487419521:web:fcf791247b7eefc2a82b80",
  measurementId: "G-B34HTXXMVS"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const $ = (id) => document.getElementById(id);

/* ─── منطق الدخول اللحظي ─── */
onAuthStateChanged(auth, (user) => {
  if (user) {
    // 1. الدخول فوري: إظهار الواجهة فوراً بمجرد معرفة المستخدم
    document.body.classList.add('ready');
    $('loadingOverlay').style.opacity = '0';
    setTimeout(() => $('loadingOverlay').style.display = 'none', 200);

    // 2. سحب البيانات في الخلفية (Async Background) لضمان عدم توقف الواجهة
    syncProfile(user.uid);
    syncFinancials(user.uid);
    syncHistory(user.uid);
  } else {
    window.location.href = 'login.html';
  }
});

async function syncProfile(uid) {
  try {
    const snap = await getDoc(doc(db, "users", uid));
    if (snap.exists()) {
      const d = snap.data();
      $('uName').textContent = d.name || "عضو القرمني";
      if (d.photoURL) $('uImg').src = d.photoURL;
      if (d.trustScore) $('uTrust').textContent = d.trustScore + '%';
    }
  } catch (e) { console.error("Profile Error", e); }
}

async function syncFinancials(uid) {
  // سحب المحفظة
  getDoc(doc(db, "wallets", uid)).then(s => {
    if (s.exists()) numAnim($('uBal'), 0, s.data().balance || 0);
  });
  // سحب النقاط
  getDoc(doc(db, "points", uid)).then(s => {
    if (s.exists()) $('uPts').textContent = (s.data().current || 0).toLocaleString();
  });
}

async function syncHistory(uid) {
  try {
    const q = query(collection(db, "transactions"), where("uid", "==", uid), orderBy("createdAt", "desc"), limit(5));
    const snap = await getDocs(q);
    const box = $('uActs');
    
    if (snap.empty) {
      box.innerHTML = '<p style="text-align:center; padding:20px; color:var(--txm); font-size:12px;">لا توجد عمليات مسجلة</p>';
      return;
    }

    box.innerHTML = snap.docs.map(doc => {
      const tx = doc.data();
      const isIn = tx.amount > 0;
      return `
        <div class="act-item">
          <div class="act-main">
            <div class="act-ic ${isIn ? 'in' : 'out'}">${isIn ? '📥' : '📤'}</div>
            <div>
              <div style="font-size:13px; font-weight:700">${tx.title || 'عملية نظام'}</div>
              <div style="font-size:10px; color:var(--txm)">${new Date().toLocaleDateString('ar-EG')}</div>
            </div>
          </div>
          <div class="act-v ${isIn ? 'plus' : 'minus'}">${isIn ? '+' : ''}${tx.amount} Q</div>
        </div>
      `;
    }).join('');
  } catch (e) { console.error("History Error", e); }
}

// دالة الأنيميشن لزيادة سرعة شعور المستخدم بالاستجابة
function numAnim(obj, start, end) {
  let current = start;
  let range = end - start;
  let increment = end > start ? 1 : -1;
  let stepTime = Math.abs(Math.floor(800 / range)) || 10;
  let timer = setInterval(() => {
    current += (range / 20);
    if ((increment > 0 && current >= end) || (increment < 0 && current <= end)) {
      obj.innerHTML = end.toFixed(2);
      clearInterval(timer);
    } else {
      obj.innerHTML = current.toFixed(2);
    }
  }, 20);
}

window.userLogout = () => signOut(auth);

</script>
</body>
</html>
