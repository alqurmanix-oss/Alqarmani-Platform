<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب | QRMANI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Tajawal:wght@300;400;500;700;900&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, collection, serverTimestamp, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, createUserWithEmailAndPassword, sendEmailVerification, fetchSignInMethodsForEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCCHBps4vsNXWHnLpxmsJJxUsB-wAYAmBU",
    authDomain: "alqurmani-auth-x.firebaseapp.com",
    projectId: "alqurmani-auth-x",
    storageBucket: "alqurmani-auth-x.firebasestorage.app",
    messagingSenderId: "558487419521",
    appId: "1:558487419521:web:fcf791247b7eefc2a82b80",
    measurementId: "G-B34HTXXMVS"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  
  // تصدير الأدوات للنافذة العالمية مع إضافة محرك فحص Auth الصارم
  window._db = db;
  window._auth = auth;
  window._firestore = { doc, getDoc, setDoc, collection, serverTimestamp, query, where, getDocs };
  window._authMethods = { fetchSignInMethodsForEmail };
</script>

<style>
/* --- احتفظت بكامل تنسيقاتك الفاخرة بدون حذف حرف واحد --- */
:root {
  --gold-1: #FFD700; --gold-2: #FFC200; --gold-3: #FFB000; --gold-4: #D4A017;
  --gold-5: #B8860B; --gold-6: #996515; --gold-7: #7A4F10;
  --neon-green: #00FF87; --neon-red: #FF2D55; --bg-deep: #050508;
  --bg-card: rgba(10,10,18,0.97); --bg-input: rgba(255,255,255,0.04);
  --border-subtle: rgba(255,215,0,0.15); --border-active: rgba(255,215,0,0.6);
  --text-primary: #F0E8D5; --text-muted: rgba(240,232,213,0.5);
  --shadow-gold: 0 0 40px rgba(212,160,23,0.25); --shadow-neon: 0 0 20px rgba(0,255,135,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Cairo', 'Tajawal', sans-serif; background: var(--bg-deep);
  min-height: 100vh; overflow-x: hidden; color: var(--text-primary); direction: rtl;
}

.bg-layer {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(180,130,10,0.12) 0%, transparent 60%),
              radial-gradient(ellipse 60% 80% at 80% 90%, rgba(90,50,5,0.15) 0%, transparent 60%),
              radial-gradient(ellipse 100% 100% at 50% 50%, #07070F 0%, #050508 100%);
}

.bg-grid {
  position: fixed; inset: 0; z-index: 0;
  background-image: linear-gradient(rgba(212,160,23,0.04) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(212,160,23,0.04) 1px, transparent 1px);
  background-size: 60px 60px; mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
}

.particles { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
.particle { position: absolute; border-radius: 50%; background: var(--gold-1); animation: float-particle linear infinite; opacity: 0; }
@keyframes float-particle {
  0% { transform: translateY(100vh) scale(0); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.2; }
  100% { transform: translateY(-20px) scale(1); opacity: 0; }
}

.page-wrapper { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
.logo-container { text-align: center; margin-bottom: 36px; animation: logo-enter 1.2s cubic-bezier(0.22,1,0.36,1) forwards; }
@keyframes logo-enter { from { opacity:0; transform: translateY(-30px) scale(0.9); } to { opacity:1; transform: translateY(0) scale(1); } }

.logo-text {
  font-family: 'Cinzel', serif; font-size: clamp(42px, 8vw, 72px); font-weight: 900; letter-spacing: 12px;
  background: linear-gradient(135deg, var(--gold-1) 0%, var(--gold-2) 14%, var(--gold-3) 28%, var(--gold-4) 42%, var(--gold-5) 56%, var(--gold-6) 72%, var(--gold-7) 86%, var(--gold-1) 100%);
  background-size: 200% 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; animation: gold-shimmer 4s ease-in-out infinite; filter: drop-shadow(0 0 30px rgba(212,160,23,0.5));
}
@keyframes gold-shimmer { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

.logo-line { height: 2px; width: 60%; margin: 10px auto; background: linear-gradient(90deg, transparent, var(--gold-4), transparent); animation: line-expand 1.5s ease forwards; }
@keyframes line-expand { from { width: 0; opacity: 0; } to { width: 60%; opacity: 1; } }
.logo-sub { font-size: 11px; letter-spacing: 6px; color: var(--gold-5); text-transform: uppercase; font-family: 'Cinzel', serif; }

.card {
  width: 100%; max-width: 520px; background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 24px; padding: 48px 44px 40px; position: relative;
  backdrop-filter: blur(30px); box-shadow: 0 0 0 1px rgba(255,215,0,0.06), 0 40px 80px rgba(0,0,0,0.7), var(--shadow-gold), inset 0 1px 0 rgba(255,215,0,0.08);
  animation: card-enter 1s cubic-bezier(0.22,1,0.36,1) 0.3s both;
}
@keyframes card-enter { from { opacity:0; transform: translateY(40px) scale(0.96); } to { opacity:1; transform: translateY(0) scale(1); } }

.card::before { content:''; position:absolute; inset:-1px; border-radius: 25px; background: linear-gradient(135deg, rgba(212,160,23,0.3), transparent 40%, transparent 60%, rgba(212,160,23,0.1)); z-index: -1; pointer-events: none; }
.card-title { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 32px; color: var(--text-primary); letter-spacing: 1px; }
.card-title span { color: var(--gold-3); }

.field-group { margin-bottom: 20px; position: relative; }
.field-label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--gold-5); margin-bottom: 8px; }
.input-wrapper { position: relative; display: flex; align-items: center; }

.field-input {
  width: 100%; padding: 14px 50px 14px 20px; background: var(--bg-input); border: 1.5px solid var(--border-subtle); border-radius: 12px;
  color: var(--text-primary); font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 500; outline: none; transition: all 0.3s ease; direction: rtl;
}
.field-input::placeholder { color: var(--text-muted); }
.field-input:focus { border-color: var(--border-active); background: rgba(255,255,255,0.06); box-shadow: 0 0 0 3px rgba(212,160,23,0.1), 0 0 20px rgba(212,160,23,0.1); }
.field-input.valid { border-color: var(--neon-green); box-shadow: 0 0 0 3px rgba(0,255,135,0.08), 0 0 15px rgba(0,255,135,0.12); }
.field-input.invalid { border-color: var(--neon-red); box-shadow: 0 0 0 3px rgba(255,45,85,0.08), 0 0 15px rgba(255,45,85,0.12); }

.status-icon { position: absolute; left: 14px; font-size: 18px; font-weight: 900; transition: all 0.3s; animation: pop-in 0.3s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes pop-in { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.status-icon.ok { color: var(--neon-green); text-shadow: 0 0 12px var(--neon-green); }
.status-icon.err { color: var(--neon-red); text-shadow: 0 0 12px var(--neon-red); }

.field-msg { font-size: 11.5px; margin-top: 6px; padding-right: 4px; min-height: 16px; transition: all 0.3s; letter-spacing: 0.5px; }
.field-msg.ok { color: var(--neon-green); }
.field-msg.err { color: var(--neon-red); }

.strength-bar-wrap { margin-top: 10px; height: 5px; border-radius: 10px; background: rgba(255,255,255,0.08); overflow: hidden; }
.strength-bar { height: 100%; border-radius: 10px; transition: all 0.5s cubic-bezier(0.22,1,0.36,1); width: 0%; }
.strength-1 { width:25%; background: var(--neon-red); } .strength-2 { width:50%; background: #FF9500; }
.strength-3 { width:75%; background: var(--gold-1); } .strength-4 { width:100%; background: var(--neon-green); }

.pw-rules { margin-top: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; }
.pw-rule { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--text-muted); transition: color 0.3s; }
.pw-rule.met { color: var(--neon-green); }
.pw-rule .rule-dot { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid currentColor; display: flex; align-items: center; justify-content: center; font-size: 9px; flex-shrink: 0; }
.pw-rule.met .rule-dot { background: var(--neon-green); border-color: var(--neon-green); box-shadow: 0 0 8px var(--neon-green); }

.btn-submit {
  width: 100%; padding: 16px; background: linear-gradient(135deg, var(--gold-4), var(--gold-2), var(--gold-5));
  background-size: 200% 200%; border: none; border-radius: 14px; color: #1a0f00; font-family: 'Cairo', sans-serif;
  font-size: 16px; font-weight: 900; letter-spacing: 2px; cursor: pointer; position: relative; overflow: hidden;
  transition: all 0.3s; animation: gold-shimmer 3s ease infinite; box-shadow: 0 8px 30px rgba(180,130,10,0.4);
}
.btn-submit:disabled { opacity: 0.4; cursor: not-allowed; animation: none; background: rgba(100,80,30,0.4); color: var(--text-muted); }

/* --- باقي التنسيقات المودال وغيرها بقيت كما هي في ملفك الأصلي --- */
.modal-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); display: none; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: opacity 0.4s ease; }
.modal-overlay.open { opacity: 1; display: flex; pointer-events: all; }
.modal { background: linear-gradient(145deg, #0D0D1A, #09090F); border: 1px solid rgba(212,160,23,0.3); border-radius: 28px; padding: 48px 44px; width: 100%; max-width: 600px; position: relative; transform: scale(0.9); transition: transform 0.4s; }
.modal-overlay.open .modal { transform: scale(1); }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-grid"></div>
<div class="particles" id="particles"></div>

<div class="page-wrapper">
  <div class="logo-container">
    <div class="logo-text">QRMANI</div>
    <div class="logo-line"></div>
    <div class="logo-sub">Sovereign Access System</div>
  </div>

  <div class="card">
    <div class="card-title">إنشاء <span>حساب جديد</span></div>

    <div class="field-group">
      <label class="field-label">اسم المستخدم</label>
      <div class="input-wrapper">
        <input type="text" class="field-input" id="usernameInput" placeholder="مثلاً: AbuAbdullah_77" dir="ltr">
        <div id="usernameStatus"></div>
      </div>
      <div class="field-msg" id="usernameMsg"></div>
    </div>

    <div class="field-group">
      <label class="field-label">البريد الإلكتروني</label>
      <div class="input-wrapper">
        <input type="email" class="field-input" id="emailInput" placeholder="official@domain.com" dir="ltr">
        <div id="emailStatus"></div>
      </div>
      <div class="field-msg" id="emailMsg"></div>
    </div>

    <div class="field-group">
      <label class="field-label">رقم الهاتف</label>
      <div class="input-wrapper">
        <input type="tel" class="field-input" id="phoneInput" placeholder="+201000000000" dir="ltr">
        <div id="phoneStatus"></div>
      </div>
      <div class="field-msg" id="phoneMsg"></div>
    </div>

    <div class="field-group">
      <label class="field-label">كلمة المرور</label>
      <div class="input-wrapper">
        <input type="password" class="field-input" id="passwordInput" placeholder="••••••••" dir="ltr">
      </div>
      <div class="strength-bar-wrap"><div class="strength-bar" id="strengthBar"></div></div>
      <div class="pw-rules">
        <div class="pw-rule" id="r-len"><span class="rule-dot"></span>8 أحرف</div>
        <div class="pw-rule" id="r-upper"><span class="rule-dot">✓</span>حرف كبير</div>
        <div class="pw-rule" id="r-num"><span class="rule-dot">✓</span>رقم</div>
        <div class="pw-rule" id="r-special"><span class="rule-dot">✓</span>رمز</div>
      </div>
    </div>

    <button class="btn-submit" id="submitBtn" disabled onclick="handleSignup()">إنشاء الحساب الإمبراطوري</button>
  </div>
</div>

<div class="modal-overlay" id="successModalOverlay">
  <div class="modal">
    <h2 style="color:var(--neon-green); text-align:center;">تم إنشاء هويتك بنجاح!</h2>
    <p style="text-align:center; margin:20px 0; color:var(--text-muted);">يرجى تفعيل حسابك عبر الرابط المرسل لبريدك الإلكتروني.</p>
    <button class="btn-submit" onclick="location.href='login.html'">الانتقال لتسجيل الدخول</button>
  </div>
</div>

<script>
/* محرك الجسيمات - كما وضعته أنت */
(function() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 3 + 1;
    p.style.cssText = `width:${size}px; height:${size}px; left:${Math.random()*100}%; animation-duration:${Math.random()*15+10}s; opacity:0;`;
    container.appendChild(p);
  }
})();

/* ═══════════════════════════════════════════════
   المحرك الأمني الصارم لـ أبو عبد الله
═══════════════════════════════════════════════ */

async function validateEmailStrictly() {
  const email = document.getElementById('emailInput').value.trim();
  const statusDiv = document.getElementById('emailStatus');
  const msgDiv = document.getElementById('emailMsg');
  const input = document.getElementById('emailInput');

  if (!email || !email.includes('@')) return;

  statusDiv.innerHTML = '<span class="status-icon" style="color:var(--gold-3)">...</span>';
  
  try {
    // 1. الفحص في سجلات Auth (هذا هو الحل الجذري للصورة التي أرسلتها)
    const methods = await window._authMethods.fetchSignInMethodsForEmail(window._auth, email);
    
    // 2. الفحص في Firestore
    const q = window._firestore.query(window._firestore.collection(window._db, "users"), window._firestore.where("email", "==", email));
    const querySnapshot = await window._firestore.getDocs(q);

    if (methods.length > 0 || !querySnapshot.empty) {
      statusDiv.innerHTML = '<span class="status-icon err">✖</span>';
      msgDiv.innerText = "هذا البريد محجوز في النظام الإمبراطوري";
      msgDiv.className = "field-msg err";
      input.classList.add('invalid'); input.classList.remove('valid');
      return false;
    } else {
      statusDiv.innerHTML = '<span class="status-icon ok">✔</span>';
      msgDiv.innerText = "البريد متاح للاستخدام";
      msgDiv.className = "field-msg ok";
      input.classList.add('valid'); input.classList.remove('invalid');
      return true;
    }
  } catch (e) {
    console.error(e);
    return false;
  }
}

// ربط الفحص بحدث الخروج من الحقل (blur) لضمان الدقة
document.getElementById('emailInput').addEventListener('blur', validateEmailStrictly);

/* منطق زر التسجيل النهائي */
async function handleSignup() {
  const btn = document.getElementById('submitBtn');
  const email = document.getElementById('emailInput').value;
  const pass = document.getElementById('passwordInput').value;

  btn.disabled = true;
  btn.innerText = "جاري تأمين البيانات...";

  try {
    // التأكد الأخير قبل الضغط
    const isAvailable = await validateEmailStrictly();
    if (!isAvailable) throw new Error("البيانات مسجلة مسبقاً");

    const cred = await window._auth.createUserWithEmailAndPassword(window._auth, email, pass);
    await window._auth.sendEmailVerification(cred.user);
    
    // حفظ البيانات في Firestore
    await window._firestore.setDoc(window._firestore.doc(window._db, "users", cred.user.uid), {
      email: email,
      uid: cred.user.uid,
      createdAt: window._firestore.serverTimestamp()
    });

    document.getElementById('successModalOverlay').classList.add('open');
  } catch (err) {
    alert("فشل العملية: " + err.message);
    btn.disabled = false;
    btn.innerText = "إنشاء الحساب الإمبراطوري";
  }
}

// تفعيل الزر عند إدخال البيانات (تبسيطاً للمثال)
document.addEventListener('input', () => {
    const e = document.getElementById('emailInput').value;
    const p = document.getElementById('passwordInput').value;
    document.getElementById('submitBtn').disabled = !(e && p.length >= 8);
});
</script>
</body>
</html>
