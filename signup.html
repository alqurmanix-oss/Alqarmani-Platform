<script>
(function(){

/* ════ WAIT FIREBASE ════ */
function boot(){
  const FB = window.__FB;
  if(!FB){ window.addEventListener('fb_ready',boot,{once:true}); return; }
  run(FB);
}
boot();

function run(FB){

const {
  db, auth, doc, getDoc, setDoc, serverTimestamp,
  createUserWithEmailAndPassword, sendEmailVerification
} = FB;

/* ════ STATE ════ */
const S = { u:false,e:false,ph:false,pw:false,cf:false,terms:false };
const cache = new Map();

/* ════ HELPERS ════ */
function setF(p,t,m){
  const i=document.getElementById(p+'I');
  const s=document.getElementById(p+'S');
  const f=document.getElementById(p+'M');
  i?.classList.remove('ok','er');
  if(s) s.innerHTML='';
  if(t==='loading'){
    s.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';
    f.textContent=''; return;
  }
  if(t==='ok'){ i.classList.add('ok'); s.innerHTML='✓'; }
  if(t==='er'){ i.classList.add('er'); s.innerHTML='✕'; }
  f.textContent=m||'';
}

/* ════ CACHE + FIRESTORE ════ */
async function regExists(type,val){
  const key=type+'__'+val;
  if(cache.has(key)) return cache.get(key);

  try{
    const snap=await getDoc(doc(db,'public_registry',key));
    const ex=snap.exists();
    cache.set(key,ex);
    return ex;
  }catch{ return false; }
}

/* ════ BUTTON ════ */
function checkBtn(){
  const ok = S.u&&S.e&&S.ph&&S.pw&&S.cf&&S.terms;
  document.getElementById('subBtn').disabled=!ok;
}

/* ════ USERNAME ════ */
let uReq=0,uT;
document.getElementById('uI').addEventListener('input',function(){
  clearTimeout(uT);
  S.u=false; checkBtn();

  const v=this.value.trim().toLowerCase();
  const id=++uReq;

  if(v.length<3){ setF('u','er','3 أحرف على الأقل'); return; }
  if(!/^[a-z0-9_.]+$/.test(v)){ setF('u','er','حروف/أرقام فقط'); return; }

  setF('u','loading');

  uT=setTimeout(async()=>{
    const ex=await regExists('usernames',v);
    if(id!==uReq) return;

    if(ex){ setF('u','er','الاسم مستخدم'); }
    else { setF('u','ok','متاح'); S.u=true; }

    checkBtn();
  },400);
});

/* ════ EMAIL ════ */
let eReq=0,eT;
document.getElementById('eI').addEventListener('input',function(){
  clearTimeout(eT);
  S.e=false; checkBtn();

  const v=this.value.trim().toLowerCase();
  const id=++eReq;

  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)){
    setF('e','er','إيميل غير صحيح'); return;
  }

  setF('e','loading');

  eT=setTimeout(async()=>{
    const ex=await regExists('emails',v);
    if(id!==eReq) return;

    if(ex){ setF('e','er','الإيميل مستخدم'); }
    else { setF('e','ok','متاح'); S.e=true; }

    checkBtn();
  },400);
});

/* ════ PHONE ════ */
let phReq=0,phT;
function valPhone(){
  clearTimeout(phT);
  S.ph=false; checkBtn();

  const raw=document.getElementById('phI').value;
  const code=document.getElementById('pc').value;
  const num=code+raw.replace(/\D/g,'');

  const id=++phReq;

  if(num.length<8){ setF('ph','er','رقم غير صحيح'); return; }

  setF('ph','loading');

  phT=setTimeout(async()=>{
    const ex=await regExists('phones',num);
    if(id!==phReq) return;

    if(ex){ setF('ph','er','الرقم مستخدم'); }
    else { setF('ph','ok','متاح'); S.ph=true; }

    checkBtn();
  },400);
}
document.getElementById('phI').addEventListener('input',valPhone);

/* ════ PASSWORD ════ */
document.getElementById('pwI').addEventListener('input',function(){
  const v=this.value;
  S.pw = v.length>=8 && /[A-Z]/.test(v) && /[0-9]/.test(v);
  checkBtn();
  document.getElementById('cfI').dispatchEvent(new Event('input'));
});

/* ════ CONFIRM ════ */
document.getElementById('cfI').addEventListener('input',function(){
  const ok = this.value === document.getElementById('pwI').value;
  S.cf = ok;
  setF('cf', ok?'ok':'er', ok?'متطابق':'غير متطابق');
  checkBtn();
});

/* ════ TERMS ════ */
document.getElementById('ck').onclick=()=>{
  S.terms=!S.terms;
  checkBtn();
};

/* ════ SIGNUP ════ */
let submitting=false;

document.getElementById('subBtn').addEventListener('click',async function(){
  if(submitting || this.disabled) return;
  submitting=true;

  const email=document.getElementById('eI').value.trim();
  const pass=document.getElementById('pwI').value;
  const user=document.getElementById('uI').value.trim();
  const phone=document.getElementById('phI').value;

  this.innerHTML='جارى...';

  try{
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    await sendEmailVerification(cred.user);

    await setDoc(doc(db,'users',cred.user.uid),{
      email,user,phone,
      createdAt:serverTimestamp()
    });

    alert('تم إنشاء الحساب بنجاح');

  }catch(e){
    alert(e.code);
  }

  this.innerHTML='إنشاء الحساب';
  submitting=false;
});

}
})();
</script>
