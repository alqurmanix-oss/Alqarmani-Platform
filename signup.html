<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب | QRMANI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Tajawal:wght@300;400;500;700;900&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, collection, serverTimestamp, query, where, getDocs, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCCHBps4vsNXWHnLpxmsJJxUsB-wAYAmBU",
    authDomain: "alqurmani-auth-x.firebaseapp.com",
    projectId: "alqurmani-auth-x",
    storageBucket: "alqurmani-auth-x.firebasestorage.app",
    messagingSenderId: "558487419521",
    appId: "1:558487419521:web:fcf791247b7eefc2a82b80",
    measurementId: "G-B34HTXXMVS"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  
  // تصدير الأدوات للنافذة العامة لاستخدامها في السكريبت السفلي
  window._db = db;
  window._auth = auth;
  window._firestore = { doc, getDoc, setDoc, collection, serverTimestamp, query, where, getDocs, runTransaction };
  window._authMethods = { createUserWithEmailAndPassword, sendEmailVerification };
</script>

<style>
:root {
  --gold-1: #FFD700;
  --gold-2: #FFC200;
  --gold-3: #FFB000;
  --gold-4: #D4A017;
  --gold-5: #B8860B;
  --gold-6: #996515;
  --gold-7: #7A4F10;
  --neon-green: #00FF87;
  --neon-red: #FF2D55;
  --bg-deep: #050508;
  --bg-card: rgba(10,10,18,0.97);
  --bg-input: rgba(255,255,255,0.04);
  --border-subtle: rgba(255,215,0,0.15);
  --border-active: rgba(255,215,0,0.6);
  --text-primary: #F0E8D5;
  --text-muted: rgba(240,232,213,0.5);
  --shadow-gold: 0 0 40px rgba(212,160,23,0.25);
  --shadow-neon: 0 0 20px rgba(0,255,135,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Cairo', 'Tajawal', sans-serif;
  background: var(--bg-deep);
  min-height: 100vh;
  overflow-x: hidden;
  color: var(--text-primary);
  direction: rtl;
}

/* ─── ANIMATED BACKGROUND ─── */
.bg-layer {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(180,130,10,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 90%, rgba(90,50,5,0.15) 0%, transparent 60%),
    radial-gradient(ellipse 100% 100% at 50% 50%, #07070F 0%, #050508 100%);
}

.bg-grid {
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(212,160,23,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(212,160,23,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
}

.particles {
  position: fixed; inset: 0; z-index: 0; overflow: hidden;
}
.particle {
  position: absolute; border-radius: 50%;
  background: var(--gold-1);
  animation: float-particle linear infinite;
  opacity: 0;
}

@keyframes float-particle {
  0%   { transform: translateY(100vh) scale(0); opacity: 0; }
  10%  { opacity: 0.6; }
  90%  { opacity: 0.2; }
  100% { transform: translateY(-20px) scale(1); opacity: 0; }
}

/* ─── MAIN LAYOUT ─── */
.page-wrapper {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 20px;
}

/* ─── LOGO ─── */
.logo-container {
  text-align: center; margin-bottom: 36px;
  animation: logo-enter 1.2s cubic-bezier(0.22,1,0.36,1) forwards;
}

@keyframes logo-enter {
  from { opacity:0; transform: translateY(-30px) scale(0.9); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

.logo-text {
  font-family: 'Cinzel', serif;
  font-size: clamp(42px, 8vw, 72px);
  font-weight: 900;
  letter-spacing: 12px;
  background: linear-gradient(
    135deg,
    var(--gold-1) 0%,
    var(--gold-2) 14%,
    var(--gold-3) 28%,
    var(--gold-4) 42%,
    var(--gold-5) 56%,
    var(--gold-6) 72%,
    var(--gold-7) 86%,
    var(--gold-1) 100%
  );
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: gold-shimmer 4s ease-in-out infinite;
  filter: drop-shadow(0 0 30px rgba(212,160,23,0.5));
}

@keyframes gold-shimmer {
  0%,100% { background-position: 0% 50%; }
  50%      { background-position: 100% 50%; }
}

.logo-line {
  height: 2px; width: 60%;
  margin: 10px auto;
  background: linear-gradient(90deg, transparent, var(--gold-4), transparent);
  animation: line-expand 1.5s ease forwards;
}

@keyframes line-expand {
  from { width: 0; opacity: 0; }
  to   { width: 60%; opacity: 1; }
}

.logo-sub {
  font-size: 11px; letter-spacing: 6px;
  color: var(--gold-5); text-transform: uppercase;
  font-family: 'Cinzel', serif;
}

/* ─── CARD ─── */
.card {
  width: 100%; max-width: 520px;
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: 24px;
  padding: 48px 44px 40px;
  position: relative;
  backdrop-filter: blur(30px);
  box-shadow:
    0 0 0 1px rgba(255,215,0,0.06),
    0 40px 80px rgba(0,0,0,0.7),
    var(--shadow-gold),
    inset 0 1px 0 rgba(255,215,0,0.08);
  animation: card-enter 1s cubic-bezier(0.22,1,0.36,1) 0.3s both;
}

@keyframes card-enter {
  from { opacity:0; transform: translateY(40px) scale(0.96); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

.card::before {
  content:''; position:absolute; inset:-1px;
  border-radius: 25px;
  background: linear-gradient(135deg, rgba(212,160,23,0.3), transparent 40%, transparent 60%, rgba(212,160,23,0.1));
  z-index: -1; pointer-events: none;
}

.card-title {
  font-size: 22px; font-weight: 700;
  text-align: center; margin-bottom: 32px;
  color: var(--text-primary);
  letter-spacing: 1px;
}
.card-title span { color: var(--gold-3); }

/* ─── FORM FIELDS ─── */
.field-group { margin-bottom: 20px; position: relative; }

.field-label {
  display: block; font-size: 12px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--gold-5); margin-bottom: 8px;
  transition: color 0.3s;
}

.input-wrapper {
  position: relative; display: flex; align-items: center;
}

.field-input {
  width: 100%; padding: 14px 50px 14px 20px;
  background: var(--bg-input);
  border: 1.5px solid var(--border-subtle);
  border-radius: 12px;
  color: var(--text-primary);
  font-family: 'Cairo', sans-serif;
  font-size: 15px; font-weight: 500;
  outline: none;
  transition: all 0.3s ease;
  direction: rtl;
}

.field-input::placeholder { color: var(--text-muted); }

.field-input:focus {
  border-color: var(--border-active);
  background: rgba(255,255,255,0.06);
  box-shadow: 0 0 0 3px rgba(212,160,23,0.1), 0 0 20px rgba(212,160,23,0.1);
}

.field-input.valid {
  border-color: var(--neon-green);
  box-shadow: 0 0 0 3px rgba(0,255,135,0.08), 0 0 15px rgba(0,255,135,0.12);
}

.field-input.invalid {
  border-color: var(--neon-red);
  box-shadow: 0 0 0 3px rgba(255,45,85,0.08), 0 0 15px rgba(255,45,85,0.12);
}

.field-icon {
  position: absolute; left: 16px;
  font-size: 18px; pointer-events: none;
  transition: all 0.3s;
}

.status-icon {
  position: absolute; left: 14px;
  font-size: 18px; font-weight: 900;
  transition: all 0.3s;
  animation: pop-in 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes pop-in {
  from { transform: scale(0); opacity: 0; }
  to   { transform: scale(1); opacity: 1; }
}

.status-icon.ok  { color: var(--neon-green); text-shadow: 0 0 12px var(--neon-green); }
.status-icon.err { color: var(--neon-red);   text-shadow: 0 0 12px var(--neon-red); }

/* ─── FEEDBACK MESSAGES ─── */
.field-msg {
  font-size: 11.5px; margin-top: 6px; padding-right: 4px;
  min-height: 16px; transition: all 0.3s;
  letter-spacing: 0.5px;
}
.field-msg.ok  { color: var(--neon-green); }
.field-msg.err { color: var(--neon-red); }

/* ─── SUGGESTIONS ─── */
.suggestions {
  margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px;
}
.suggestion-tag {
  padding: 4px 12px; border-radius: 20px;
  background: rgba(212,160,23,0.1);
  border: 1px solid rgba(212,160,23,0.25);
  color: var(--gold-3); font-size: 12px; cursor: pointer;
  transition: all 0.2s; font-family: 'Cairo', sans-serif;
}
.suggestion-tag:hover {
  background: rgba(212,160,23,0.2);
  border-color: var(--gold-3);
  transform: translateY(-1px);
}

/* ─── PASSWORD STRENGTH ─── */
.strength-bar-wrap {
  margin-top: 10px;
  height: 5px; border-radius: 10px;
  background: rgba(255,255,255,0.08);
  overflow: hidden;
}
.strength-bar {
  height: 100%; border-radius: 10px;
  transition: all 0.5s cubic-bezier(0.22,1,0.36,1);
  width: 0%;
}
.strength-0 { width:0%;   background: transparent; }
.strength-1 { width:25%;  background: var(--neon-red); box-shadow: 0 0 8px var(--neon-red); }
.strength-2 { width:50%;  background: #FF9500; box-shadow: 0 0 8px #FF9500; }
.strength-3 { width:75%;  background: var(--gold-1); box-shadow: 0 0 8px var(--gold-1); }
.strength-4 { width:100%; background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green); }

.strength-label {
  font-size: 11px; text-align: left;
  margin-top: 4px; transition: color 0.3s;
  letter-spacing: 1px; text-transform: uppercase;
}

/* ─── PASSWORD RULES ─── */
.pw-rules {
  margin-top: 14px;
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 6px 12px;
}
.pw-rule {
  display: flex; align-items: center; gap: 6px;
  font-size: 11.5px; color: var(--text-muted);
  transition: color 0.3s;
}
.pw-rule.met { color: var(--neon-green); }
.pw-rule .rule-dot {
  width: 14px; height: 14px; border-radius: 50%;
  border: 1.5px solid currentColor;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; flex-shrink: 0; transition: all 0.3s;
}
.pw-rule.met .rule-dot {
  background: var(--neon-green);
  border-color: var(--neon-green);
  box-shadow: 0 0 8px var(--neon-green);
}

/* ─── PHONE INPUT ─── */
.phone-row { display: flex; gap: 10px; }
.phone-code {
  flex-shrink: 0; padding: 14px 16px;
  background: var(--bg-input);
  border: 1.5px solid var(--border-subtle);
  border-radius: 12px; color: var(--text-primary);
  font-family: 'Cairo', sans-serif;
  font-size: 15px; cursor: pointer;
  transition: all 0.3s; min-width: 90px;
  text-align: center; direction: ltr;
}
.phone-code:focus { outline: none; border-color: var(--border-active); }

/* ─── TERMS ─── */
.terms-row {
  display: flex; align-items: flex-start; gap: 12px;
  margin: 22px 0;
}
.custom-check {
  width: 20px; height: 20px; flex-shrink: 0;
  border: 1.5px solid var(--border-active);
  border-radius: 6px; background: var(--bg-input);
  cursor: pointer; transition: all 0.3s;
  display: flex; align-items: center; justify-content: center;
  margin-top: 2px;
}
.custom-check.checked {
  background: var(--gold-4);
  border-color: var(--gold-3);
  box-shadow: 0 0 10px rgba(212,160,23,0.4);
}
.custom-check .check-mark { font-size: 12px; display: none; }
.custom-check.checked .check-mark { display: block; }
.terms-text { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
.terms-link {
  color: var(--gold-3); cursor: pointer;
  text-decoration: underline; text-underline-offset: 2px;
  transition: color 0.2s;
}
.terms-link:hover { color: var(--gold-1); }

/* ─── SUBMIT BUTTON ─── */
.btn-submit {
  width: 100%; padding: 16px;
  background: linear-gradient(135deg, var(--gold-4), var(--gold-2), var(--gold-5));
  background-size: 200% 200%;
  border: none; border-radius: 14px;
  color: #1a0f00; font-family: 'Cairo', sans-serif;
  font-size: 16px; font-weight: 900;
  letter-spacing: 2px; cursor: pointer;
  position: relative; overflow: hidden;
  transition: all 0.3s;
  box-shadow: 0 8px 30px rgba(180,130,10,0.4);
}
.btn-submit:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(180,130,10,0.6);
}
.btn-submit:disabled {
  opacity: 0.4; cursor: not-allowed;
  background: rgba(100,80,30,0.4); color: var(--text-muted);
}

/* ─── MODALS ─── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px; opacity: 0;
  transition: opacity 0.4s ease;
  pointer-events: none;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: linear-gradient(145deg, #0D0D1A, #09090F);
  border: 1px solid rgba(212,160,23,0.3);
  border-radius: 28px; padding: 48px 44px;
  width: 100%; max-width: 600px;
  position: relative;
  transform: scale(0.9) translateY(20px);
  transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
  max-height: 90vh; overflow-y: auto;
}
.modal-overlay.open .modal { transform: scale(1) translateY(0); }

.success-email-badge {
  display: inline-block; padding: 8px 20px;
  background: rgba(0,255,135,0.1); border: 1px solid rgba(0,255,135,0.3);
  border-radius: 20px; color: var(--neon-green); font-size: 13px;
  font-weight: 600; direction: ltr;
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-10px); }
  75% { transform: translateX(10px); }
}
.shake { animation: shake 0.4s ease; }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-grid"></div>
<div class="particles" id="particles"></div>

<div class="page-wrapper">
  <div class="logo-container">
    <div class="logo-text">QRMANI</div>
    <div class="logo-line"></div>
    <div class="logo-sub">Sovereign Access System</div>
  </div>

  <div class="card" id="signupCard">
    <div class="card-title">إنشاء <span>حساب جديد</span></div>

    <div class="referral-note" id="refNote" style="display:none; padding:10px; background:rgba(212,160,23,0.1); border-radius:10px; margin-bottom:15px; font-size:12px; color:var(--gold-1);">
      <span class="ref-icon">🔗</span>
      <span id="refText">انضممت عبر رابط إحالة خاص</span>
    </div>

    <div class="field-group">
      <label class="field-label">اسم المستخدم</label>
      <div class="input-wrapper">
        <input type="text" class="field-input" id="usernameInput" placeholder="اختر اسماً فريداً..." autocomplete="off" dir="ltr">
        <div id="usernameStatus"></div>
      </div>
      <div class="field-msg" id="usernameMsg"></div>
    </div>

    <div class="field-group">
      <label class="field-label">البريد الإلكتروني</label>
      <div class="input-wrapper">
        <input type="email" class="field-input" id="emailInput" placeholder="example@domain.com" autocomplete="off" dir="ltr">
        <div id="emailStatus"></div>
      </div>
      <div class="field-msg" id="emailMsg"></div>
    </div>

    <div class="field-group">
      <label class="field-label">رقم الهاتف</label>
      <div class="phone-row">
        <select class="phone-code" id="phoneCode" dir="ltr">
          <option value="+20">🇪🇬 +20</option>
          <option value="+966">🇸🇦 +966</option>
          <option value="+971">🇦🇪 +971</option>
        </select>
        <div class="input-wrapper" style="flex:1">
          <input type="tel" class="field-input" id="phoneInput" placeholder="0xxxxxxxxx" dir="ltr">
          <div id="phoneStatus"></div>
        </div>
      </div>
      <div class="field-msg" id="phoneMsg"></div>
    </div>

    <div class="field-group">
      <label class="field-label">كلمة المرور</label>
      <div class="input-wrapper">
        <input type="password" class="field-input" id="passwordInput" placeholder="••••••••••••" dir="ltr">
      </div>
      <div class="strength-bar-wrap"><div class="strength-bar" id="strengthBar"></div></div>
      <div class="pw-rules" style="font-size:10px; margin-top:10px; display:grid; grid-template-columns:1fr 1fr; gap:5px;">
         <div id="r-len">● 8 أحرف</div>
         <div id="r-upper">● حرف كبير</div>
         <div id="r-num">● رقم</div>
         <div id="r-special">● رمز خاص</div>
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">تأكيد كلمة المرور</label>
      <input type="password" class="field-input" id="confirmInput" placeholder="••••••••••••" dir="ltr">
      <div class="field-msg" id="confirmMsg"></div>
    </div>

    <div class="terms-row">
      <div class="custom-check" id="termsCheck" onclick="toggleTerms()"><span class="check-mark">✓</span></div>
      <div class="terms-text">أوافق على الشروط</div>
    </div>

    <button class="btn-submit" id="submitBtn" onclick="handleSignup()" disabled>إنشاء الحساب</button>
  </div>
</div>

<div class="modal-overlay" id="successModalOverlay">
  <div class="modal">
    <h2 style="color:var(--neon-green)">تم التسجيل بنجاح!</h2>
    <p style="margin:20px 0;">تم إرسال رابط التفعيل إلى بريدك الإلكتروني.</p>
    <div id="successEmail" class="success-email-badge"></div>
    <button class="btn-submit" onclick="location.href='login.html'" style="margin-top:20px;">الدخول الآن</button>
  </div>
</div>

<script>
/* ─── الملحقات الأساسية ─── */
const state = { username:false, email:false, phone:false, password:false, confirm:false, terms:false, ref:null };

// جلب كود الإحالة من الرابط
const params = new URLSearchParams(window.location.search);
if(params.get('ref')) {
    state.ref = params.get('ref');
    document.getElementById('refNote').style.display = 'block';
}

function toggleTerms() {
    state.terms = !state.terms;
    document.getElementById('termsCheck').classList.toggle('checked', state.terms);
    validateForm();
}

function setStatus(field, status, msg) {
    const input = document.getElementById(field + 'Input');
    const msgEl = document.getElementById(field + 'Msg');
    input.className = 'field-input ' + (status === 'ok' ? 'valid' : 'invalid');
    msgEl.textContent = msg;
    msgEl.className = 'field-msg ' + status;
    state[field] = (status === 'ok');
    validateForm();
}

function validateForm() {
    const btn = document.getElementById('submitBtn');
    btn.disabled = !(state.username && state.email && state.phone && state.password && state.confirm && state.terms);
}

/* ─── التحقق من البيانات عبر Firebase ─── */
async function checkAvailability(type, value) {
    const { doc, getDoc } = window._firestore;
    const ref = doc(window._db, 'public_registry', type + '_' + value);
    const snap = await getDoc(ref);
    return !snap.exists();
}

document.getElementById('usernameInput').addEventListener('input', async (e) => {
    const val = e.target.value.trim();
    if(val.length < 3) return setStatus('username', 'err', 'قصير جداً');
    const isOk = await checkAvailability('username', val.toLowerCase());
    isOk ? setStatus('username', 'ok', 'اسم متاح') : setStatus('username', 'err', 'مستخدم بالفعل');
});

document.getElementById('emailInput').addEventListener('input', async (e) => {
    const val = e.target.value.trim();
    if(!val.includes('@')) return setStatus('email', 'err', 'بريد غير صالح');
    const isOk = await checkAvailability('email', val.toLowerCase());
    isOk ? setStatus('email', 'ok', 'بريد متاح') : setStatus('email', 'err', 'مسجل مسبقاً');
});

document.getElementById('passwordInput').addEventListener('input', (e) => {
    const val = e.target.value;
    const hasUpper = /[A-Z]/.test(val);
    const hasNum = /[0-9]/.test(val);
    const isLong = val.length >= 8;
    state.password = (hasUpper && hasNum && isLong);
    document.getElementById('strengthBar').style.width = (isLong ? (hasUpper && hasNum ? '100%' : '50%') : '10%');
    document.getElementById('strengthBar').style.backgroundColor = state.password ? 'var(--neon-green)' : 'var(--neon-red)';
    validateForm();
});

document.getElementById('confirmInput').addEventListener('input', (e) => {
    const pass = document.getElementById('passwordInput').value;
    if(e.target.value === pass) setStatus('confirm', 'ok', 'متطابق');
    else setStatus('confirm', 'err', 'غير متطابق');
});

/* ─── المعالجة النهائية لإنشاء الحساب ─── */
async function handleSignup() {
    const btn = document.getElementById('submitBtn');
    btn.innerHTML = '<span class="spinner"></span> جاري المعالجة...';
    btn.disabled = true;

    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    const username = document.getElementById('usernameInput').value.trim();
    const phone = document.getElementById('phoneCode').value + document.getElementById('phoneInput').value.trim();

    try {
        const { createUserWithEmailAndPassword, sendEmailVerification } = window._authMethods;
        const { doc, setDoc, serverTimestamp, runTransaction } = window._firestore;

        // 1. إنشاء الحساب في Auth
        const userCred = await createUserWithEmailAndPassword(window._auth, email, password);
        const uid = userCred.user.uid;

        // 2. إرسال بريد التحقق
        await sendEmailVerification(userCred.user);

        // 3. تخزين البيانات في Firestore مع نظام السجلات العامة لضمان التفرد
        await setDoc(doc(window._db, 'users', uid), {
            uid,
            username,
            email: email.toLowerCase(),
            phone,
            points: 10, // نقاط ترحيبية
            role: 'user',
            createdAt: serverTimestamp(),
            referrer: state.ref || 'none',
            status: 'pending_verification'
        });

        // تسجيل البيانات في السجل العام لمنع التكرار مستقبلاً
        await setDoc(doc(window._db, 'public_registry', 'username_' + username.toLowerCase()), { uid });
        await setDoc(doc(window._db, 'public_registry', 'email_' + email.toLowerCase()), { uid });

        // 4. إظهار النجاح
        document.getElementById('successEmail').textContent = email;
        document.getElementById('successModalOverlay').classList.add('open');

    } catch (error) {
        console.error(error);
        btn.disabled = false;
        btn.textContent = 'إنشاء الحساب';
        document.getElementById('signupCard').classList.add('shake');
        setTimeout(() => document.getElementById('signupCard').classList.remove('shake'), 500);
        alert('خطأ: ' + error.message);
    }
}
</script>
