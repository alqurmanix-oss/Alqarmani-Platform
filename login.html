<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALQURMANI X | THE ROYAL GATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;500;900&display=swap" rel="stylesheet">
    <style>
        /* =========================================================
           CORE LUXURY DESIGN (الفخامة الخام)
        ========================================================= */
        :root {
            --gold-light: #f9e297; --gold-main: #d4af37; --gold-dark: #8a6d15;
            --bg: #030303; --glass: rgba(10, 10, 10, 0.9);
            --border: rgba(212, 175, 55, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }

        /* خلفية الجزيئات الذهبية (تأثير الغبار الذهبي المتطاير) */
        #particles-js { position: absolute; width: 100%; height: 100%; z-index: 1; }

        /* اللوجو السيادي: سطر واحد + 7 درجات ذهبية متحركة */
        .royal-header { text-align: center; position: relative; z-index: 10; margin-bottom: 30px; }
        .royal-logo {
            font-size: 45px; font-weight: 900; letter-spacing: 15px;
            background: linear-gradient(to right, #8a6d15, #d4af37, #f9e297, #fff, #f9e297, #d4af37, #8a6d15);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: goldenStream 4s linear infinite; white-space: nowrap;
        }
        @keyframes goldenStream { to { background-position: 200% center; } }

        /* حاوية الدخول الفاخرة */
        .auth-card {
            position: relative; z-index: 10; width: 90%; max-width: 460px;
            background: var(--glass); backdrop-filter: blur(40px);
            border: 1px solid var(--border); border-radius: 40px; padding: 60px 45px;
            box-shadow: 0 0 100px rgba(0,0,0,1), inset 0 0 40px rgba(212, 175, 55, 0.05);
            animation: slideUp 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        /* الحقول الذكية */
        .input-wrap { position: relative; margin-bottom: 35px; }
        .input-wrap input {
            width: 100%; background: rgba(0,0,0,0.8); border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 18px; padding: 22px 25px; color: #fff; font-size: 17px; 
            transition: 0.5s; outline: none;
        }
        .input-wrap input:focus { border-color: var(--gold-main); box-shadow: 0 0 25px rgba(212, 175, 55, 0.2); }
        .input-wrap label {
            position: absolute; right: 25px; top: 50%; transform: translateY(-50%);
            color: #555; pointer-events: none; transition: 0.3s;
        }
        .input-wrap input:focus ~ label, .input-wrap input:not(:placeholder-shown) ~ label {
            top: -12px; font-size: 11px; color: var(--gold-main); background: var(--bg); padding: 0 10px;
        }

        /* زر الدخول الرئيسي */
        .btn-royal {
            width: 100%; height: 70px; background: linear-gradient(45deg, var(--gold-dark), var(--gold-main), var(--gold-light));
            border: none; border-radius: 18px; color: #000; font-weight: 900; font-size: 18px;
            cursor: pointer; transition: 0.5s; box-shadow: 0 15px 40px rgba(212, 175, 55, 0.2);
        }
        .btn-royal:hover { transform: translateY(-3px); box-shadow: 0 20px 50px rgba(212, 175, 55, 0.4); filter: brightness(1.1); }

        /* الروابط السفلية */
        .links-area { display: flex; justify-content: space-between; margin-top: 35px; font-size: 13px; }
        .links-area span, .links-area a { color: var(--gold-main); text-decoration: none; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .links-area span:hover { text-shadow: 0 0 10px var(--gold-main); }

        /* =========================================================
           ULTRA-LUXURY MODALS (نوافذ القمة الفاخرة)
        ========================================================= */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(25px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            opacity: 0; visibility: hidden; transition: 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .overlay.active { opacity: 1; visibility: visible; }

        .modal-box {
            background: #0a0a0a; border: 1.5px solid var(--gold-main); border-radius: 35px;
            padding: 50px; width: 92%; max-width: 440px; text-align: center;
            transform: scale(0.8) translateY(50px); transition: 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 50px 100px rgba(0,0,0,1);
        }
        .overlay.active .modal-box { transform: scale(1) translateY(0); }

        .m-icon { font-size: 65px; margin-bottom: 25px; display: block; filter: drop-shadow(0 0 15px var(--gold-main)); }
        .m-title { color: var(--gold-main); font-size: 26px; font-weight: 900; margin-bottom: 15px; }
        .m-text { color: #888; font-size: 15px; line-height: 1.8; margin-bottom: 35px; }

        .m-btn {
            display: block; width: 100%; padding: 18px; border: 1px solid var(--gold-main);
            color: var(--gold-main); text-decoration: none; border-radius: 15px; font-weight: 900;
            background: transparent; cursor: pointer; transition: 0.4s;
        }
        .m-btn:hover { background: var(--gold-main); color: #000; box-shadow: 0 0 30px var(--gold-main); }

        /* حالة النجاح (Success Accent) */
        .modal-success { border-color: #00ff41; box-shadow: 0 0 40px rgba(0, 255, 65, 0.1); }
        .modal-success .m-title { color: #00ff41; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="auth-card">
        <div class="royal-header">
            <h1 class="royal-logo">ALQURMANI X</h1>
        </div>

        <form id="auth-form">
            <div class="input-wrap">
                <input type="email" id="email" placeholder=" " required>
                <label>البريد المعتمد</label>
            </div>
            <div class="input-wrap">
                <input type="password" id="pass" placeholder=" " required>
                <label>رمز الدخول</label>
            </div>
            <button type="submit" class="btn-royal" id="auth-btn">تحقق من الهوية</button>
        </form>

        <div class="links-area">
            <span onclick="openModal('recovery-gate')">نسيت كلمة السر؟</span>
            <a href="signup.html">عضوية جديدة</a>
        </div>
    </div>

    <div class="overlay" id="recovery-gate">
        <div class="modal-box">
            <span class="m-icon">🔑</span>
            <h2 class="m-title">استعادة الوصول</h2>
            <p class="m-text">أدخل بريدك الإلكتروني لإعادة تهيئة رمز الدخول عبر القنوات المشفرة.</p>
            <input type="email" id="rec-mail" style="width:100%; padding:15px; background:#000; border:1px solid #333; color:#fff; border-radius:12px; margin-bottom:20px; text-align:center;">
            <button class="m-btn" onclick="executeRecovery()">إرسال الرابط</button>
            <p style="margin-top:20px; cursor:pointer; color:#444" onclick="closeModal('recovery-gate')">رجوع</p>
        </div>
    </div>

    <div class="overlay" id="welcome-gate">
        <div class="modal-box modal-success">
            <span class="m-icon">👑</span>
            <h2 class="m-title">أهلاً بك سيدي</h2>
            <p class="m-text">تمت المصادقة بنجاح.. جاري تهيئة المركز التنفيذي.</p>
        </div>
    </div>

    <div class="overlay" id="status-gate">
        <div class="modal-box" id="status-border" style="border-color: #ff3e3e;">
            <span class="m-icon" id="status-icon">🚫</span>
            <h2 class="m-title" id="status-title" style="color: #ff3e3e;">خرق أمني</h2>
            <p class="m-text" id="status-msg"></p>
            <a href="support.html" class="m-btn" id="status-link">التواصل مع الدعم الفني</a>
            <p id="close-status" style="margin-top:20px; cursor:pointer; color:#444; display:none" onclick="closeModal('status-gate')">إغلاق</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCCHBps4vsNXWHnLpxmsJJxUsB-wAYAmBU",
            authDomain: "alqurmani-auth-x.firebaseapp.com",
            projectId: "alqurmani-auth-x",
            storageBucket: "alqurmani-auth-x.firebasestorage.app",
            messagingSenderId: "558487419521",
            appId: "1:558487419521:web:fcf791247b7eefc2a82b80"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // غبار الذهب المتطاير
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 100 },
                "color": { "value": "#d4af37" },
                "opacity": { "value": 0.5, "random": true },
                "size": { "value": 2.5, "random": true },
                "move": { "enable": true, "speed": 1.5, "direction": "top", "out_mode": "out" }
            }
        });

        // إدارة النوافذ الفاخرة
        window.openModal = (id) => document.getElementById(id).classList.add('active');
        window.closeModal = (id) => document.getElementById(id).classList.remove('active');

        window.executeRecovery = async () => {
            const email = document.getElementById('rec-mail').value;
            if(!email) return;
            try {
                await sendPasswordResetEmail(auth, email);
                alert("تم الإرسال.. تفقد بريدك.");
                closeModal('recovery-gate');
            } catch(e) { alert("خطأ في العملية."); }
        };

        // نظام الحماية الذكي
        let fails = 0;
        const showStatus = (title, msg, canClose = false) => {
            document.getElementById('status-title').innerText = title;
            document.getElementById('status-msg').innerText = msg;
            document.getElementById('close-status').style.display = canClose ? 'block' : 'none';
            openModal('status-gate');
        };

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('auth-btn');
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            btn.disabled = true;
            btn.innerText = "جاري الفحص السيادي...";

            try {
                const userCred = await signInWithEmailAndPassword(auth, email, pass);
                const userDoc = await getDoc(doc(db, "users", userCred.user.uid));
                const data = userDoc.data();

                if (data.status !== 'active') {
                    showStatus("الحساب غير نشط", `نعتذر، حالة حسابك هي (${data.status}). يرجى المراجعة الفنية.`);
                    return;
                }

                // نجاح الدخول - ترحيب فخم لحظي
                openModal('welcome-gate');
                setTimeout(() => window.location.href = 'index.html', 2000);

            } catch (error) {
                fails++;
                btn.disabled = false;
                btn.innerText = "تحقق من الهوية";

                if (fails >= 5) {
                    showStatus("حظر أمني", "تم تجاوز محاولات الدخول. تواصل مع الدعم الفني لفك الحظر.");
                } else {
                    showStatus("خطأ في البيانات", `المعلومات المدخلة غير صحيحة. المحاولات المتبقية: ${5 - fails}`, true);
                }
            }
        });
    </script>
</body>
</html>
