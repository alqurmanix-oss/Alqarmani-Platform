<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALQURMANI X | الدخول الموحد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f9e297;
            --bg: #030303;
            --glass: rgba(15, 15, 15, 0.8);
            --border: rgba(212, 175, 55, 0.3);
            --error: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }

        /* --- محرك الجزيئات الذهبية --- */
        #particles-js { position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 1; }

        /* --- حاوية الدخول الزجاجية --- */
        .login-box {
            position: relative; z-index: 10; width: 100%; max-width: 440px;
            background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: 30px; padding: 50px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.9), inset 0 0 40px rgba(212, 175, 55, 0.05);
            animation: emerge 1.2s cubic-bezier(0.2, 1, 0.2, 1);
        }

        @keyframes emerge { from { opacity: 0; transform: scale(0.9) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: var(--gold); font-weight: 900; font-size: 32px; letter-spacing: 5px; text-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
        .header p { color: #888; font-size: 13px; margin-top: 8px; letter-spacing: 2px; }

        .input-wrap { position: relative; margin-bottom: 25px; }
        .input-wrap input {
            width: 100%; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 15px; padding: 18px 20px; color: #fff; font-size: 16px; transition: 0.4s; outline: none;
        }
        .input-wrap input:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); background: #000; }
        .label { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: #666; pointer-events: none; transition: 0.3s; }
        .input-wrap input:focus ~ .label, .input-wrap input:not(:placeholder-shown) ~ .label { top: 0; font-size: 11px; color: var(--gold); background: var(--bg); padding: 0 8px; }

        .btn-prime {
            width: 100%; background: linear-gradient(135deg, var(--gold) 0%, #b5952f 100%);
            color: #000; border: none; border-radius: 15px; padding: 18px; font-weight: 900;
            cursor: pointer; transition: 0.4s; box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
        }
        .btn-prime:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(212, 175, 55, 0.4); }

        .footer-links { text-align: center; margin-top: 30px; font-size: 13px; color: #666; }
        .footer-links a { color: var(--gold); text-decoration: none; font-weight: 700; }

        /* --- النوافذ المنبثقة الفخمة (Modals) --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            opacity: 0; visibility: hidden; transition: 0.5s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-card {
            background: #0f0f0f; border: 1px solid var(--gold); border-radius: 25px; padding: 40px;
            width: 90%; max-width: 400px; text-align: center; transform: translateY(50px); transition: 0.5s;
        }
        .modal-overlay.active .modal-card { transform: translateY(0); }
        .modal-icon { font-size: 50px; margin-bottom: 20px; display: block; }
        .modal-title { color: var(--gold); font-size: 22px; margin-bottom: 10px; font-weight: 900; }
        .modal-msg { color: #ccc; font-size: 15px; line-height: 1.6; margin-bottom: 25px; }

        /* حالة الحظر/التجميد */
        .btn-support {
            display: inline-block; width: 100%; padding: 12px; border: 1px solid var(--gold);
            color: var(--gold); text-decoration: none; border-radius: 10px; font-weight: 700; transition: 0.3s;
        }
        .btn-support:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="login-box">
        <div class="header">
            <h1>ALQURMANI X</h1>
            <p>الولوج إلى النظام التنفيذي</p>
        </div>

        <form id="auth-form">
            <div class="input-wrap">
                <input type="email" id="email" placeholder=" " required>
                <label class="label">البريد المعتمد</label>
            </div>
            <div class="input-wrap">
                <input type="password" id="pass" placeholder=" " required>
                <label class="label">رمز التحقق</label>
            </div>
            <button type="submit" class="btn-prime" id="btn-text">تأكيد الهوية</button>
        </form>

        <div class="footer-links">
            ليس لديك تصريح؟ <a href="signup.html">تقديم طلب انضمام</a>
        </div>
    </div>

    <div class="modal-overlay" id="success-modal">
        <div class="modal-card">
            <span class="modal-icon">✨</span>
            <h2 class="modal-title">مرحباً بك مجدداً</h2>
            <p class="modal-msg">تم التحقق من الهوية بنجاح.. جاري تهيئة بيئة العمل الخاصة بك.</p>
        </div>
    </div>

    <div class="modal-overlay" id="status-modal">
        <div class="modal-card">
            <span class="modal-icon" id="status-icon">🚫</span>
            <h2 class="modal-title" id="status-title">تنبيه أمني</h2>
            <p class="modal-msg" id="status-msg"></p>
            <a href="support.html" class="btn-support">التواصل مع الإدارة الفنية</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCCHBps4vsNXWHnLpxmsJJxUsB-wAYAmBU",
            authDomain: "alqurmani-auth-x.firebaseapp.com",
            projectId: "alqurmani-auth-x",
            storageBucket: "alqurmani-auth-x.firebasestorage.app",
            messagingSenderId: "558487419521",
            appId: "1:558487419521:web:fcf791247b7eefc2a82b80"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let attempts = 0;

        // تهيئة جزيئات الذهب
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 },
                "color": { "value": "#d4af37" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5 },
                "size": { "value": 3 },
                "move": { "enable": true, "speed": 2, "direction": "top" }
            }
        });

        const showStatus = (title, msg, icon = "🚫") => {
            document.getElementById('status-title').innerText = title;
            document.getElementById('status-msg').innerText = msg;
            document.getElementById('status-icon').innerText = icon;
            document.getElementById('status-modal').classList.add('active');
        };

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const btn = document.getElementById('btn-text');

            btn.innerText = "جاري التحقق...";
            btn.disabled = true;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // جلب حالة الحساب من Firestore
                const userDoc = await getDoc(doc(db, "users", user.uid));
                const data = userDoc.data();

                // التحقق من حالة الحساب (متعطل/محذوف/مجمد)
                if (data.status !== 'active') {
                    showStatus("الحساب غير نشط", `نعتذر، حالة حسابك الحالية هي (${data.status}). يرجى مراجعة الدعم الفني.`);
                    return;
                }

                // نجاح الدخول - ترحيب فخم سريع
                document.getElementById('success-modal').classList.add('active');
                setTimeout(() => window.location.href = 'index.html', 2500);

            } catch (error) {
                attempts++;
                btn.disabled = false;
                btn.innerText = "تأكيد الهوية";

                if (attempts >= 5) {
                    let lockTime = attempts === 5 ? 1 : 2;
                    if (attempts > 7) {
                        showStatus("تجميد أمني", "تم تجميد محاولات الدخول لهذا الحساب نهائياً بسبب تكرار الخطأ. تواصل مع الإدارة.");
                    } else {
                        showStatus("حظر مؤقت", `لقد استنفدت محاولاتك. سيتم حظر الدخول لمدة ${lockTime} دقيقة.`);
                    }
                } else {
                    alert("خطأ في بيانات الدخول. محاولاتك المتبقية: " + (5 - attempts));
                }
            }
        });
    </script>
</body>
</html>
