<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALQURMANI X | Secure Gateway</title>
    <style>
        :root {
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --bg: #050505;
            --input-bg: rgba(15, 15, 15, 0.9);
            --error: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; border: none; }

        body {
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
        }

        .login-vault {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: var(--input-bg);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
        }

        .login-vault::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .brand-logo {
            font-size: 28px;
            font-weight: 900;
            color: var(--gold);
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .gate-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 35px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group { margin-bottom: 20px; position: relative; }

        input {
            width: 100%;
            padding: 18px 25px;
            background: #0a0a0a;
            border-radius: 15px;
            color: #fff;
            font-size: 15px;
            transition: 0.3s;
            text-align: center;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        input:focus {
            box-shadow: 0 0 15px var(--gold-glow);
            background: #111;
        }

        .btn-access {
            width: 100%;
            padding: 18px;
            background: var(--gold);
            color: #000;
            font-weight: 900;
            border-radius: 15px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
            transition: 0.4s;
        }

        .btn-access:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px var(--gold-glow);
        }

        .status-msg {
            margin-top: 20px;
            font-size: 13px;
            min-height: 20px;
        }

        #loader {
            display: none;
            width: 20px; height: 20px;
            border: 3px solid #000;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .footer-links {
            margin-top: 30px;
            font-size: 12px;
            color: #444;
        }

        .footer-links a { color: var(--gold); text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>

    <div class="login-vault">
        <div class="brand-logo">ALQURMANI X</div>
        <div class="gate-label">بوابة التحقق الرقمي الموحدة</div>

        <form id="loginForm">
            <div class="input-group">
                <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="كلمة المرور" required>
            </div>
            
            <button type="submit" class="btn-access" id="submitBtn">
                <span id="btnText">طلب الدخول</span>
                <div id="loader"></div>
            </button>
        </form>

        <div id="statusMsg" class="status-msg"></div>

        <div class="footer-links">
            <a href="signup.html">إنشاء حساب جديد</a> • 
            <a href="#">استعادة الوصول</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCCHBps4vsNXWHnLpxmsJJxUsB-wAYAmBU",
            authDomain: "alqurmanix-auth-x.firebaseapp.com",
            projectId: "alqurmanix-auth-x",
            appId: "1:558487419521:web:fcf791247b7eefc2a82b80"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const loginForm = document.getElementById('loginForm');
        const statusMsg = document.getElementById('statusMsg');
        const submitBtn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // تهيئة واجهة التحميل
            btnText.style.display = 'none';
            loader.style.display = 'block';
            statusMsg.innerText = "جاري فحص المحركات السباعية...";
            statusMsg.style.color = "var(--gold)";

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // 1. محاولة تسجيل الدخول الأساسي
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. تطبيق قواعد الصرامة (The Iron Core)
                const userDoc = await getDoc(doc(db, "users", user.uid));
                
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    const now = new Date().getTime();
                    const lastLogin = data.lastLogin ? data.lastLogin.toDate().getTime() : 0;
                    const idleLimit = 90 * 24 * 60 * 60 * 1000; // 90 يوم

                    // فحص حالة الحساب (active) + فحص الخمول + فحص التوثيق + الثقة
                    if (data.status !== 'active') throw new Error("الحساب معلق أو قيد المراجعة.");
                    if (!user.emailVerified) throw new Error("يرجى توثيق البريد الإلكتروني أولاً.");
                    if (data.trustScore < 50) throw new Error("مستوى الثقة في الحساب منخفض جداً.");
                    if (now - lastLogin > idleLimit && lastLogin !== 0) throw new Error("تم تعليق الحساب بسبب الخمول (90 يوم).");
                    if (data.lockUntil && now < data.lockUntil.toDate().getTime()) throw new Error("الحساب محظور مؤقتاً بسبب أخطاء متكررة.");

                    // 3. النجاح: إصدار تصريح الجلسة الآمنة
                    sessionStorage.setItem('SECURE_SESSION_ACTIVE', 'TRUE');
                    statusMsg.innerText = "تم التحقق بنجاح.. جاري توجيهك للمركز.";
                    statusMsg.style.color = "#00ff41";

                    setTimeout(() => {
                        window.location.replace("index.html");
                    }, 1500);

                } else {
                    throw new Error("سجل البيانات غير موجود في النظام.");
                }

            } catch (error) {
                loader.style.display = 'none';
                btnText.style.display = 'block';
                statusMsg.innerText = error.message;
                statusMsg.style.color = "var(--error)";
                auth.signOut(); // طرد المستخدم فوراً عند الفشل في أي قاعدة
            }
        });
    </script>
</body>
</html>
