<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALQURMANI X | الدخول الموحد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-primary: #d4af37;
            --gold-hover: #b5952f;
            --bg-dark: #050505;
            --surface: rgba(18, 18, 18, 0.85);
            --border: rgba(212, 175, 55, 0.3);
            --text-main: #ffffff;
            --text-muted: #888888;
            --error: #dc3545;
            --success: #28a745;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at center, #111111 0%, #000000 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* مؤثرات الخلفية الفخمة */
        body::before {
            content: '';
            position: absolute;
            width: 200vw;
            height: 200vh;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.03) 0%, transparent 50%);
            animation: rotateBg 60s linear infinite;
            z-index: 0;
        }

        @keyframes rotateBg {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* حاوية تسجيل الدخول */
        .login-container {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            z-index: 1;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            transform: translateY(20px);
            opacity: 0;
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeUp {
            to { transform: translateY(0); opacity: 1; }
        }

        .brand-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-header h1 {
            color: var(--gold-primary);
            font-weight: 900;
            font-size: 28px;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .brand-header p {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* تصميم الحقول */
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 18px 20px;
            color: var(--text-main);
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-control:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
            background: rgba(0, 0, 0, 0.8);
        }

        .input-control::placeholder {
            color: transparent; /* إخفاء النص الافتراضي لاستخدام الـ Label العائم */
        }

        .floating-label {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 15px;
            transition: all 0.3s ease;
            pointer-events: none;
            background: transparent;
            padding: 0 5px;
        }

        .input-control:focus ~ .floating-label,
        .input-control:not(:placeholder-shown) ~ .floating-label {
            top: 0;
            font-size: 12px;
            color: var(--gold-primary);
            background: #111;
        }

        /* الخيارات الإضافية (نسيت كلمة المرور) */
        .form-options {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 30px;
            margin-top: -10px;
        }

        .forgot-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.3s ease;
            font-family: inherit;
        }

        .forgot-btn:hover {
            color: var(--gold-primary);
            text-decoration: underline;
        }

        /* زر الدخول الرئيسي */
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--gold-primary) 0%, var(--gold-hover) 100%);
            color: var(--bg-dark);
            border: none;
            border-radius: 12px;
            padding: 18px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(212, 175, 55, 0.3);
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        .submit-btn.loading {
            color: transparent;
            pointer-events: none;
        }

        .submit-btn.loading::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            border: 3px solid var(--bg-dark);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* رسائل الخطأ */
        .error-message {
            color: var(--error);
            font-size: 13px;
            text-align: center;
            margin-bottom: 15px;
            min-height: 20px;
            font-weight: 500;
        }

        /* قسم الاشتراك */
        .signup-section {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
            color: var(--text-muted);
        }

        .signup-link {
            color: var(--gold-primary);
            text-decoration: none;
            font-weight: 700;
            margin-right: 5px;
            transition: 0.3s;
        }

        .signup-link:hover {
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        /* ================= النافذة المنبثقة (Modal الفخامة) ================= */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--surface);
            border: 1px solid var(--gold-primary);
            border-radius: 20px;
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            transform: scale(0.9);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.9), inset 0 0 30px rgba(212, 175, 55, 0.05);
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.1);
            color: var(--gold-primary);
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            border: 2px solid var(--gold-primary);
        }

        .modal-title {
            color: #fff;
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .modal-text {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .modal-btn {
            background: transparent;
            color: var(--gold-primary);
            border: 1px solid var(--gold-primary);
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }

        .modal-btn:hover {
            background: var(--gold-primary);
            color: var(--bg-dark);
        }

    </style>
</head>
<body>

    <div class="login-container">
        <div class="brand-header">
            <h1>ALQURMANI X</h1>
            <p>بوابة الدخول الموحدة</p>
        </div>

        <div id="error-display" class="error-message"></div>

        <form id="login-form">
            <div class="input-group">
                <input type="email" id="email" class="input-control" placeholder=" " required autocomplete="off">
                <label class="floating-label">البريد الإلكتروني المعتمد</label>
            </div>

            <div class="input-group">
                <input type="password" id="password" class="input-control" placeholder=" " required autocomplete="off">
                <label class="floating-label">رمز المرور</label>
            </div>

            <div class="form-options">
                <button type="button" class="forgot-btn" id="forgot-password-trigger">هل نسيت رمز المرور؟</button>
            </div>

            <button type="submit" id="submit-btn" class="submit-btn">تسجيل الدخول</button>
        </form>

        <div class="signup-section">
            ليس لديك حساب معتمد؟ <a href="signup.html" class="signup-link">اشترك الآن</a>
        </div>
    </div>

    <div class="modal-overlay" id="recovery-modal">
        <div class="modal-content">
            <div class="modal-icon">✓</div>
            <h2 class="modal-title">تم الإجراء بنجاح</h2>
            <p class="modal-text">تم إرسال رابط آمن لتعيين رمز مرور جديد إلى بريدك الإلكتروني بنجاح. يرجى مراجعة صندوق الوارد الخاص بك.</p>
            <button class="modal-btn" onclick="closeModal()">حسناً، فهمت</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // إعدادات الربط بناءً على البيانات المقدمة
        const firebaseConfig = {
            apiKey: "AIzaSyCCHBps4vsNXWHnLpxmsJJxUsB-wAYAmBU",
            authDomain: "alqurmani-auth-x.firebaseapp.com",
            projectId: "alqurmani-auth-x",
            storageBucket: "alqurmani-auth-x.firebasestorage.app",
            messagingSenderId: "558487419521",
            appId: "1:558487419521:web:fcf791247b7eefc2a82b80",
            measurementId: "G-B34HTXXMVS"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // العناصر
        const loginForm = document.getElementById('login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submit-btn');
        const errorDisplay = document.getElementById('error-display');
        const forgotPwdBtn = document.getElementById('forgot-password-trigger');
        const modal = document.getElementById('recovery-modal');

        // دالة عرض الأخطاء بشكل رسمي
        const showError = (message) => {
            errorDisplay.innerText = message;
            submitBtn.classList.remove('loading');
        };

        // معالجة تسجيل الدخول
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDisplay.innerText = '';
            submitBtn.classList.add('loading');

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            try {
                // إجبار النظام على تذكر الجلسة
                await setPersistence(auth, browserLocalPersistence);
                
                // محاولة الدخول
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                
                // زرع مفتاح التوجيه الآمن للوحة التحكم
                sessionStorage.setItem('ENTRY_POINT', 'LOGIN');
                
                // التوجيه الفوري
                window.location.replace('index.html');

            } catch (error) {
                console.error("Login Error:", error.code);
                // معالجة الأخطاء بصيغة رسمية واحترافية
                switch (error.code) {
                    case 'auth/invalid-credential':
                    case 'auth/user-not-found':
                    case 'auth/wrong-password':
                        showError("البيانات المدخلة غير صحيحة. يرجى التحقق من البريد أو رمز المرور.");
                        break;
                    case 'auth/too-many-requests':
                        showError("تم إيقاف الحساب مؤقتاً لدواعٍ أمنية. يرجى المحاولة لاحقاً.");
                        break;
                    case 'auth/invalid-email':
                        showError("صيغة البريد الإلكتروني غير صالحة.");
                        break;
                    default:
                        showError("تعذر إتمام العملية. يرجى التأكد من الاتصال بالشبكة.");
                }
            }
        });

        // معالجة طلب استعادة كلمة المرور
        forgotPwdBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            errorDisplay.innerText = '';

            if (!email) {
                showError("يرجى إدخال البريد الإلكتروني أولاً في الحقل المخصص لإرسال رابط الاستعادة.");
                emailInput.focus();
                return;
            }

            // التحقق من صيغة البريد مبدئياً
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError("يرجى إدخال بريد إلكتروني بصيغة صحيحة.");
                return;
            }

            forgotPwdBtn.style.opacity = '0.5';
            forgotPwdBtn.innerText = "جاري الإرسال...";

            try {
                await sendPasswordResetEmail(auth, email);
                // إظهار النافذة المنبثقة الفخمة
                modal.classList.add('active');
            } catch (error) {
                console.error("Reset Error:", error.code);
                if (error.code === 'auth/user-not-found') {
                    showError("لا يوجد حساب مرتبط بهذا البريد الإلكتروني.");
                } else {
                    showError("حدث خطأ أثناء محاولة إرسال الرابط. يرجى المحاولة لاحقاً.");
                }
            } finally {
                forgotPwdBtn.style.opacity = '1';
                forgotPwdBtn.innerText = "هل نسيت رمز المرور؟";
            }
        });

        // دالة إغلاق النافذة المنبثقة (متاحة عالمياً)
        window.closeModal = () => {
            modal.classList.remove('active');
            passwordInput.focus(); // إعادة التركيز لحقل كلمة المرور
        };

        // إغلاق النافذة عند الضغط خارجها
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });
    </script>
</body>
</html>
