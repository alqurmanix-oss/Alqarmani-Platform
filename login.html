<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QRMANI X — تسجيل الدخول السيادي</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --g1:#FFD700;--g2:#FFC107;--g3:#FFB300;--g4:#D4A017;--g5:#B8860B;--g6:#996515;--g7:#7A4F10;
  --ng:#00FF87;--nr:#FF2D55;--bg:#05050A;--card:rgba(10,10,22,.98);
  --inp:rgba(255,255,255,.05);--brd:rgba(255,215,0,.18);--brdA:rgba(255,215,0,.6);
  --tx:#F0E8D5;--txm:rgba(240,232,213,.45)
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif}
body{background:var(--bg);color:var(--tx);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 50% 50%,#1a1a2e,#05050a);z-index:-1}

/* تصميم الكرت الفخم */
.card{width:95%;max-width:480px;background:var(--card);border:1px solid var(--brd);border-radius:24px;padding:50px 40px;box-shadow:0 25px 50px rgba(0,0,0,.5);position:relative;backdrop-filter:blur(20px);animation:fup .8s ease}
@keyframes fup{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}

.logo-txt{font-family:'Cinzel',serif;font-size:45px;text-align:center;background:linear-gradient(to right,var(--g1),var(--g5));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:5px;letter-spacing:8px}
.subtitle{text-align:center;color:var(--g4);font-size:10px;letter-spacing:4px;margin-bottom:35px;font-weight:700;text-transform:uppercase}

.field{margin-bottom:22px;position:relative}
.lbl{display:block;font-size:11px;color:var(--g5);margin-bottom:8px;font-weight:900;letter-spacing:1px}
.fi{width:100%;padding:15px 20px;background:var(--inp);border:1.5px solid var(--brd);border-radius:12px;color:#fff;font-size:15px;transition:.3s;direction:ltr;text-align:right}
.fi:focus{border-color:var(--g2);background:rgba(255,255,255,.08);box-shadow:0 0 15px rgba(212,160,23,0.1)}

.forgot-link{display:block;text-align:left;font-size:12px;color:var(--g4);text-decoration:none;margin-top:8px;cursor:pointer;transition:.3s}
.forgot-link:hover{color:var(--g1);text-shadow:0 0 10px var(--g1)}

.sub-btn{width:100%;padding:16px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--g4),var(--g2));color:#000;font-weight:900;font-size:16px;cursor:pointer;transition:.3s;margin-top:25px;letter-spacing:1px}
.sub-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 25px rgba(212,160,23,.4)}
.sub-btn:disabled{opacity:.5;filter:grayscale(1)}

.footer-links{text-align:center;margin-top:25px;font-size:13px;color:var(--txm)}
.footer-links a{color:var(--g3);text-decoration:none;font-weight:700;margin-right:5px}

/* النوافذ المنبثقة (Modals) */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(15px);display:none;align-items:center;justify-content:center;z-index:9999;padding:20px}
.md{background:linear-gradient(145deg, #0a0a14, #121225);border:1px solid var(--brd);border-radius:30px;padding:40px;max-width:450px;width:100%;text-align:center;box-shadow:0 0 50px rgba(212,160,23,0.15);animation:mIn .4s cubic-bezier(0.175, 0.885, 0.32, 1.275)}
@keyframes mIn{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}

.md h2{color:var(--g2);font-family:'Cinzel',serif;font-size:28px;margin-bottom:15px}
.md p{color:var(--txm);line-height:1.7;margin-bottom:25px;font-size:14px}
.md-ic{font-size:60px;margin-bottom:20px;display:block}

.btn-gold{background:linear-gradient(135deg,var(--g4),var(--g2));color:#000;border:none;padding:12px 30px;border-radius:10px;font-weight:900;cursor:pointer;transition:.3s}
.btn-gold:hover{transform:scale(1.05)}

/* Spinner */
.loader { width: 20px; height: 20px; border: 3px solid rgba(0,0,0,0.1); border-top: 3px solid #000; border-radius: 50%; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-left: 10px; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCCHBps4vsNXWHnLpxmsJJxUsB-wAYAmBU",
  authDomain: "alqurmani-auth-x.firebaseapp.com",
  projectId: "alqurmani-auth-x",
  storageBucket: "alqurmani-auth-x.firebasestorage.app",
  messagingSenderId: "558487419521",
  appId: "1:558487419521:web:fcf791247b7eefc2a82b80"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// دوال الواجهة
window.showModal = (id) => document.getElementById(id).style.display = 'flex';
window.closeModal = (id) => document.getElementById(id).style.display = 'none';

// --- محرك تسجيل الدخول السيادي ---
window.handleLogin = async () => {
    const email = document.getElementById('emailInp').value.trim();
    const pass = document.getElementById('passInp').value;
    const btn = document.getElementById('loginBtn');

    if(!email || !pass) { alert("أدخل بياناتك كاملة يا إمبراطور"); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span> جاري التحقق من الهوية...';

    try {
        const cred = await signInWithEmailAndPassword(auth, email, pass);
        const userDoc = await getDoc(doc(db, 'users', cred.user.uid));

        if(!userDoc.exists()) throw new Error("لم يتم العثور على سجلاتك البرمجية.");
        
        const data = userDoc.data();

        // تطبيق القواعد (The Iron Core)
        if(!cred.user.emailVerified) throw new Error("يجب تفعيل الإيميل أولاً للوصول إلى السيادة.");
        if(data.status !== 'active' && data.role !== 'owner') throw new Error("حسابك غير نشط حالياً، تواصل مع الدعم.");
        if(data.trustScore < 50) throw new Error("درجة الثقة منخفضة جداً (أقل من 50).");

        // حساب أيام الغياب
        const lastLogin = data.lastLogin?.toDate() || new Date();
        const diffTime = Math.abs(new Date() - lastLogin);
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

        // تحديث آخر ظهور و الجلسة (قاعدة الـ 24 ساعة)
        await setDoc(doc(db, 'users', cred.user.uid), { lastLogin: serverTimestamp() }, { merge: true });
        await setDoc(doc(db, 'sessions', cred.user.uid), { 
            uid: cred.user.uid, 
            createdAt: serverTimestamp(), 
            expiresAt: new Date(Date.now() + 86400000) 
        });

        // إظهار نافذة الترحيب الفخمة
        document.getElementById('welcomeName').innerText = data.username;
        document.getElementById('lastSeenDays').innerText = diffDays === 0 ? "اليوم" : `منذ ${diffDays} يوم`;
        showModal('welcomeModal');

        // توجيه تلقائي بعد 4 ثواني
        setTimeout(() => { window.location.href = 'index.html'; }, 4000);

    } catch (err) {
        console.error(err);
        btn.disabled = false;
        btn.innerHTML = 'تسجيل الدخول';
        alert("خطأ أمني: " + err.message);
    }
};

// --- محرك استعادة كلمة السر ---
window.handleReset = async () => {
    const email = document.getElementById('resetEmailInp').value.trim();
    if(!email) { alert("من فضلك أدخل بريدك الإلكتروني"); return; }

    try {
        await sendPasswordResetEmail(auth, email);
        alert("تم إرسال رابط استعادة الوصول إلى بريدك بنجاح.");
        closeModal('resetModal');
    } catch (err) {
        alert("فشل الإرسال: " + err.message);
    }
};
</script>
</head>
<body>

<div class="card">
    <div class="logo-txt">QRMANI X</div>
    <div class="subtitle">Access the Empire</div>

    <div class="field">
        <label class="lbl">البريد الإلكتروني الإمبراطوري</label>
        <input type="email" id="emailInp" class="fi" placeholder="user@qrmani.com">
    </div>

    <div class="field">
        <label class="lbl">كلمة المرور المشفرة</label>
        <input type="password" id="passInp" class="fi" placeholder="••••••••••••">
        <span class="forgot-link" onclick="showModal('resetModal')">نسيت كلمة السر؟</span>
    </div>

    <button class="sub-btn" id="loginBtn" onclick="handleLogin()">تسجيل الدخول</button>

    <div class="footer-links">
        ليس لديك حساب؟ <a href="signup.html">اشترك الآن ←</a>
    </div>
</div>

<div class="ov" id="welcomeModal">
    <div class="md">
        <span class="md-ic">👑</span>
        <h2>مرحباً بك مجدداً</h2>
        <p>أهلاً بك يا <strong id="welcomeName" style="color:var(--g1)">...</strong> في معقلك الرقمي.<br>
        لقد كانت آخر زيارة لك <span id="lastSeenDays" style="color:var(--ng)">...</span>.<br>
        جاري الآن تهيئة محركات الإمبراطورية لك...</p>
        <div class="loader" style="border-top-color: var(--g1); width: 30px; height: 30px;"></div>
    </div>
</div>

<div class="ov" id="resetModal">
    <div class="md">
        <span class="md-ic">🔐</span>
        <h2>استعادة الوصول</h2>
        <p>أدخل بريدك الإلكتروني المسجل وسنرسل لك مفتاح تشفير جديد فوراً.</p>
        <input type="email" id="resetEmailInp" class="fi" style="margin-bottom: 20px; text-align: center;" placeholder="البريد الإلكتروني">
        <div style="display: flex; gap: 10px;">
            <button class="btn-gold" style="flex: 1;" onclick="handleReset()">إرسال الرابط</button>
            <button class="btn-gold" style="flex: 1; background: #222; color: #fff;" onclick="closeModal('resetModal')">إلغاء</button>
        </div>
    </div>
</div>

</body>
</html>
