<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALQURMANI X | نظام الولوج</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(90deg, #8a6d15, #d4af37, #f9e297, #d4af37, #8a6d15);
            --bg: #080808;
            --card-bg: rgba(20, 20, 20, 0.6);
            --border: rgba(212, 175, 55, 0.2);
            --text: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { 
            background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }

        /* خلفية سينمائية هادئة */
        .bg-overlay {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #080808 100%);
            z-index: -1;
        }

        /* اللوجو الذهبي النحيف */
        .brand-line {
            text-align: center; margin-bottom: 40px;
        }
        .logo-text {
            font-size: 32px; font-weight: 800; letter-spacing: 10px;
            background: var(--gold); background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite; display: inline-block;
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* حاوية الدخول الأنيقة */
        .login-frame {
            width: 380px; padding: 40px; background: var(--card-bg);
            backdrop-filter: blur(15px); border: 1px solid var(--border);
            border-radius: 20px; box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* الحقول المتطورة */
        .input-group { position: relative; margin-bottom: 25px; }
        .input-group input {
            width: 100%; padding: 15px 0; background: transparent; border: none;
            border-bottom: 1px solid #333; color: #fff; font-size: 16px; outline: none;
            transition: 0.3s;
        }
        .input-group label {
            position: absolute; right: 0; top: 15px; color: #666;
            pointer-events: none; transition: 0.3s;
        }
        .input-group input:focus ~ label, .input-group input:valid ~ label {
            top: -10px; font-size: 12px; color: #d4af37;
        }
        .input-group input:focus { border-bottom-color: #d4af37; }

        /* الزر الرئيسي */
        .action-btn {
            width: 100%; padding: 15px; background: #d4af37; border: none;
            border-radius: 8px; color: #000; font-weight: 800; cursor: pointer;
            transition: 0.3s; margin-top: 10px;
        }
        .action-btn:hover { background: #f9e297; transform: scale(1.02); }

        /* الروابط السفلية */
        .sub-links {
            display: flex; justify-content: space-between; margin-top: 25px;
            font-size: 13px; color: #888;
        }
        .sub-links span, .sub-links a { color: #d4af37; text-decoration: none; cursor: pointer; }

        /* النوافذ المنبثقة الذكية (تظهر عند الحاجة فقط) */
        .smart-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content {
            width: 320px; background: #111; border: 1px solid #d4af37;
            border-radius: 15px; padding: 30px; text-align: center;
            transform: scale(0.9); transition: 0.3s;
        }
        .smart-modal.show { display: flex; }
        .smart-modal.show .modal-content { transform: scale(1); }

        .modal-title { color: #d4af37; font-weight: 800; margin-bottom: 15px; }
        .modal-msg { font-size: 14px; color: #ccc; line-height: 1.6; margin-bottom: 20px; }
        
        .close-btn {
            padding: 10px 20px; background: transparent; border: 1px solid #d4af37;
            color: #d4af37; border-radius: 5px; cursor: pointer; width: 100%;
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="login-frame">
        <div class="brand-line">
            <div class="logo-text">ALQURMANI X</div>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <input type="email" id="email" required placeholder=" ">
                <label>البريد الإلكتروني</label>
            </div>
            <div class="input-group">
                <input type="password" id="pass" required placeholder=" ">
                <label>كلمة السر</label>
            </div>
            <button type="submit" class="action-btn" id="loginBtn">دخول</button>
        </form>

        <div class="sub-links">
            <span onclick="toggleModal('resetModal')">نسيت كلمة السر؟</span>
            <a href="signup.html">عضو جديد</a>
        </div>
    </div>

    <div class="smart-modal" id="resetModal">
        <div class="modal-content">
            <h3 class="modal-title">استعادة الوصول</h3>
            <p class="modal-msg">أدخل بريدك وسيصلك الرابط فوراً.</p>
            <input type="email" id="resetEmail" style="width:100%; padding:10px; margin-bottom:20px; background:#000; border:1px solid #333; color:#fff;">
            <button class="action-btn" onclick="handleReset()">إرسال</button>
            <button class="close-btn" style="margin-top:10px" onclick="toggleModal('resetModal')">إلغاء</button>
        </div>
    </div>

    <div class="smart-modal" id="statusModal">
        <div class="modal-content">
            <h3 class="modal-title" id="statusTitle"></h3>
            <p class="modal-msg" id="statusMsg"></p>
            <div id="statusActions"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCCHBps4vsNXWHnLpxmsJJxUsB-wAYAmBU",
            authDomain: "alqurmani-auth-x.firebaseapp.com",
            projectId: "alqurmani-auth-x",
            storageBucket: "alqurmani-auth-x.firebasestorage.app",
            messagingSenderId: "558487419521",
            appId: "1:558487419521:web:fcf791247b7eefc2a82b80"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // وظائف الواجهة
        window.toggleModal = (id) => document.getElementById(id).classList.toggle('show');

        window.handleReset = async () => {
            const email = document.getElementById('resetEmail').value;
            if(!email) return;
            try {
                await sendPasswordResetEmail(auth, email);
                alert("تم إرسال الرابط بنجاح.");
                toggleModal('resetModal');
            } catch(e) { alert("خطأ في الإرسال."); }
        };

        // نظام الحماية
        let fails = 0;

        const showStatus = (title, msg, link = false) => {
            document.getElementById('statusTitle').innerText = title;
            document.getElementById('statusMsg').innerText = msg;
            const actionArea = document.getElementById('statusActions');
            actionArea.innerHTML = link ? `<a href="support.html" class="action-btn" style="text-decoration:none; display:block">الدعم الفني</a>` : `<button class="close-btn" onclick="toggleModal('statusModal')">حسناً</button>`;
            toggleModal('statusModal');
        };

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            btn.innerText = "جاري التحقق...";
            btn.disabled = true;

            try {
                const userCred = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCred.user;
                const snap = await getDoc(doc(db, "users", user.uid));
                const data = snap.data();

                if(data.status !== 'active') {
                    showStatus("تنبيه", `حسابك حالياً (${data.status}). راجع الدعم.`, true);
                    return;
                }

                showStatus("نجاح", "أهلاً بك.. جاري الدخول.");
                setTimeout(() => window.location.href = 'index.html', 1500);

            } catch (err) {
                fails++;
                btn.disabled = false;
                btn.innerText = "دخول";

                if (fails >= 5) {
                    showStatus("حظر أمني", "تم تجاوز المحاولات. راجع الدعم الفني.", true);
                } else {
                    showStatus("خطأ", `البيانات غير صحيحة. المحاولات المتبقية: ${5 - fails}`);
                }
            }
        });
    </script>
</body>
</html>
