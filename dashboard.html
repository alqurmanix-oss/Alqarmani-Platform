<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>ALQURMANI X | لوحة التحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   ROOT VARIABLES (السمات الإمبراطورية)
══════════════════════════════════════ */
:root{
  --g1:#FFD700;--g2:#F5C842;--g3:#D4A017;--g4:#B8860B;--g5:#8B6914;
  --ng:#00FF87;--nr:#FF2D55;--nb:#00C8FF;
  --bg:#04040A;--bg2:#070710;--bg3:#0A0A18;
  --card:rgba(12,12,22,.96);--card2:rgba(15,15,28,.98);
  --brd:rgba(212,160,23,.2);--brdA:rgba(212,160,23,.5);
  --tx:#F0E8D5;--txm:rgba(240,232,213,.5);
  --shd:0 20px 50px rgba(0,0,0,.8);
}

/* ══════════════════════════════════════
   BASE STYLES
══════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:'Cairo',sans-serif;overflow-x:hidden;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 50% 0%, #1a1a2e 0%, #04040a 70%);z-index:-1}

/* ══════════════════════════════════════
   LAYOUT COMPONENTS
══════════════════════════════════════ */
header{padding:25px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--brd);background:var(--card);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100}
.logo{font-family:'Cinzel',serif;font-weight:900;font-size:24px;background:linear-gradient(to right,var(--g1),var(--g4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}

.container{padding:20px;max-width:1200px;margin:0 auto}

/* Stats Grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(150px, 1fr));gap:15px;margin-bottom:30px}
.stat-card{background:var(--card);border:1px solid var(--brd);border-radius:20px;padding:20px;text-align:center;transition:.3s}
.stat-card:hover{border-color:var(--g3);transform:translateY(-5px)}
.stat-val{display:block;font-size:24px;font-weight:900;color:var(--g1);margin-top:5px}
.stat-lbl{font-size:11px;color:var(--txm);text-transform:uppercase;letter-spacing:1px}

/* Main Section */
.main-card{background:var(--card2);border:1px solid var(--brdA);border-radius:28px;padding:30px;box-shadow:var(--shd);margin-bottom:30px;position:relative;overflow:hidden}
.main-card::after{content:'';position:absolute;top:0;right:0;width:100px;height:100px;background:linear-gradient(135deg, var(--g4), transparent);opacity:.1;border-radius:0 0 0 100%}

.welcome-msg{font-size:22px;font-weight:900;margin-bottom:10px}
.welcome-msg span{color:var(--g2)}

/* Activity List */
.section-title{font-size:18px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.section-title::before{content:'';width:4px;height:18px;background:var(--g2);border-radius:2px}

.activity-list{display:flex;flex-direction:column;gap:12px}
.act-item{background:rgba(255,255,255,.03);border-radius:15px;padding:15px;display:flex;align-items:center;gap:15px;border:1px solid transparent;transition:.3s}
.act-item:hover{background:rgba(255,255,255,.06);border-color:var(--brd)}
.act-icon{width:45px;height:45px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.act-icon.gold{background:rgba(255,215,0,.1);color:var(--g1)}
.act-info{flex:1}
.act-title{font-size:14px;font-weight:700}
.act-time{font-size:11px;color:var(--txm)}
.act-val{font-weight:900;font-size:15px}
.act-val.pos{color:var(--ng)}

/* Navigation Tab Bar (Mobile) */
.nav-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:90%;max-width:400px;background:var(--card);border:1px solid var(--brd);border-radius:20px;display:flex;justify-content:space-around;padding:12px;backdrop-filter:blur(20px);box-shadow:var(--shd);z-index:1000}
.nav-item{color:var(--txm);text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:5px;font-size:10px;transition:.3s}
.nav-item.active{color:var(--g1)}
.nav-item i{font-size:20px}

/* Overlay Loading */
#loadingOverlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
.spinner{width:50px;height:50px;border:3px solid var(--brd);border-top:3px solid var(--g1);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

</style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <p style="margin-top:20px; color:var(--g1); font-family:'Cinzel'; letter-spacing:2px">ALQURMANI X</p>
</div>

<header>
    <div class="logo">QRMANI X</div>
    <div style="display:flex; gap:15px; align-items:center">
        <div id="pointsBadge" style="background:var(--brd); padding:5px 12px; border-radius:20px; font-size:12px; color:var(--g1); font-weight:700">10 Q-Points</div>
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" style="width:35px; height:35px; border:1px solid var(--g1); border-radius:50%">
    </div>
</header>

<div class="container">
    
    <div class="main-card">
        <h1 class="welcome-msg">أهلاً بك يا <span>إمبراطور</span></h1>
        <p style="color:var(--txm); font-size:14px">مرحباً بك في مركز قيادة منصة القرماني الرقمية.</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="stat-lbl">الرصيد المتاح</span>
            <span class="stat-val">0.00 $</span>
        </div>
        <div class="stat-card">
            <span class="stat-lbl">الإحالات</span>
            <span class="stat-val">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-lbl">المهام</span>
            <span class="stat-val">5</span>
        </div>
    </div>

    <div class="section-title">النشاطات الأخيرة</div>
    <div class="activity-list" id="activityList">
        <div class="act-item">
            <div class="act-icon gold">💰</div>
            <div class="act-info">
                <div class="act-title">هدية التسجيل</div>
                <div class="act-time">اليوم</div>
            </div>
            <div class="act-val pos">+10 Q</div>
        </div>
        <div class="act-item">
            <div class="act-icon gold" style="background:rgba(0,200,255,.1); color:var(--nb)">🛡️</div>
            <div class="act-info">
                <div class="act-title">تفعيل الحماية</div>
                <div class="act-time">منذ قليل</div>
            </div>
            <div class="act-val" style="color:var(--nb)">نشط</div>
        </div>
    </div>

</div>

<nav class="nav-bar">
    <a href="#" class="nav-item active"><span>🏠</span> الرئيسية</a>
    <a href="#" class="nav-item"><span>📊</span> الإحصائيات</a>
    <a href="#" class="nav-item"><span>⚙️</span> الإعدادات</a>
    <a href="login.html" class="nav-item"><span>🚪</span> خروج</a>
</nav>

<script type="module">
    // محاكي للتحميل لضمان اختفاء شاشة التحميل فوراً في العرض لايف
    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            const loader = document.getElementById('loadingOverlay');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
            }, 500);
        }, 1000); // سيختفي التحميل بعد ثانية واحدة
    });
</script>

</body>
</html>
